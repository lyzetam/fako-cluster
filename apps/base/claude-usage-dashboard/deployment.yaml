apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-usage-dashboard
  namespace: claude-usage-dashboard
  labels:
    app.kubernetes.io/name: claude-usage-dashboard
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: claude-usage-dashboard
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-usage-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-usage-dashboard
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: dashboard
          image: lzetam/claude-cost-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: claude-usage-dashboard-secrets
          env:
            - name: WINDOW_DAYS
              value: "35"
            - name: LOCAL_TZ
              value: "America/Chicago"
            - name: ORG_NAME
              value: "LZ Technology LLC"
            - name: REFRESH_SECONDS
              value: "21600"
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12   # allow ~2min for first Admin-API fetch
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: claude-usage-dashboard
  namespace: claude-usage-dashboard
  labels:
    app.kubernetes.io/name: claude-usage-dashboard
spec:
  selector:
    app.kubernetes.io/name: claude-usage-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-usage-dashboard-secrets
  namespace: claude-usage-dashboard
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: claude-usage-dashboard-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_ADMIN_KEY
      remoteRef:
        key: aeonhq/anthropic-admin-key
        property: ANTHROPIC_ADMIN_KEY

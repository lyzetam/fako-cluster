apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo-blog
  namespace: blog
  labels:
    app.kubernetes.io/name: hugo-blog
    app.kubernetes.io/component: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hugo-blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hugo-blog
    spec:
      imagePullSecrets:
      - name: dockerhub-registry
      containers:
      - name: hugo
        # Pinned to an immutable commit-SHA tag. `:latest` never changes the
        # pod spec, so Flux never triggered a rollout when a new image was
        # pushed — the site froze on whatever image the pod first cached.
        # Bump this tag on each release (or add Flux image automation).
        image: lzetam/hugo:fd12a4f1769fbbeaebca83621c2f40402218afc0
        imagePullPolicy: IfNotPresent
        # Remove command override to let the image run its default nginx entrypoint
        ports:
        - containerPort: 80
          name: http
        # Volume mounts removed - the image contains a pre-built static site
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
      # Volumes and security context removed - nginx image runs with its own user

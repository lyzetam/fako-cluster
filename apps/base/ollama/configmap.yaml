# apps/base/ollama/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-configmap
  namespace: ollama
data:
  OLLAMA_HOST: "0.0.0.0"
  OLLAMA_ORIGINS: "*"
  OLLAMA_MODELS: "/root/.ollama/models"
  OLLAMA_DEBUG: "false"
  OLLAMA_NOHISTORY: "false"  # Keep conversation history
  
  # CPU-specific optimizations
  GOARCH: "amd64"
  GOOS: "linux"
---
# Separate ConfigMap for GPU-specific settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-gpu-configmap
  namespace: ollama
data:
  # GPU Configuration
  CUDA_VISIBLE_DEVICES: "0"
  NVIDIA_VISIBLE_DEVICES: "0"
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  
  # Ollama GPU Settings
  OLLAMA_GPU_LAYERS: "999"  # Force all layers to GPU
  OLLAMA_CUDA_FORCE_MMQ: "1"
  OLLAMA_FLASH_ATTENTION: "1"  # Enabled - RTX 5060 supports it; required for KV cache quant
  OLLAMA_KV_CACHE_TYPE: "q8_0"  # Quantize KV cache (~half) so model+KV fit the 8GB RTX 5060
  OLLAMA_GPU_MEMORY: "7G"  # Actual card is RTX 5060 8GB (not 12GB) - leave ~1GB for system

  # Performance Settings
  OLLAMA_NUM_PARALLEL: "1"  # Single concurrent request = single KV cache (8GB card, not 12GB)
  OLLAMA_NUM_THREAD: "8"
  OLLAMA_MAX_LOADED_MODELS: "1"  # Can keep more models in GPU memory with RTX 5070
  GOMAXPROCS: "8"
  
  # Memory Management - Extended for qwen3:8b default model
  OLLAMA_KEEP_ALIVE: "24h"  # Keep models loaded for 24 hours
  OLLAMA_MODELS_UNLOAD_AFTER_IDLE: "86400"  # 24 hours in seconds

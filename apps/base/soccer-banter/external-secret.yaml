apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: soccer-banter-secrets
  namespace: soccer-banter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: soccer-banter-secrets
    creationPolicy: Owner
  data:
    # Real Sportmonks Football API token (shared secret already in Secrets Manager).
    - secretKey: SPORTMONKS_API_TOKEN
      remoteRef:
        key: sportmonks/api
        property: api_key
    # Ollama Cloud bearer token (soccer-banter/ollama).
    - secretKey: OLLAMA_API_KEY
      remoteRef:
        key: soccer-banter/ollama
        property: api_key

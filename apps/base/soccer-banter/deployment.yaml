apiVersion: apps/v1
kind: Deployment
metadata:
  name: soccer-banter
  namespace: soccer-banter
  labels:
    app.kubernetes.io/name: soccer-banter
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: soccer-banter
    app.kubernetes.io/managed-by: flux
spec:
  # Single replica: agent memory is mutable state on a ReadWriteOnce PVC.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: soccer-banter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: soccer-banter
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: soccer-banter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: dockerhub-registry
      containers:
        - name: api
          # Pin to an immutable tag. Never :latest.
          image: lzetam/soccer-banter:20260617b
          ports:
            - name: http
              containerPort: 8000
          env:
            # Ollama Cloud (key supplied via the secret below). To use the in-cluster GPU
            # instead, set this to http://ollama-gpu.ollama.svc.cluster.local:11434 and drop
            # OLLAMA_API_KEY.
            - name: OLLAMA_BASE_URL
              value: https://ollama.com
            - name: OLLAMA_MODEL
              value: gpt-oss:20b
            - name: DATA_DIR
              value: /app/data
          envFrom:
            - secretRef:
                name: soccer-banter-secrets   # SPORTMONKS_API_TOKEN + OLLAMA_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: soccer-banter-data
        - name: tmp
          emptyDir: {}

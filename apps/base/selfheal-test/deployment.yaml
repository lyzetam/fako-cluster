apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfheal-test
  namespace: selfheal-test
  labels:
    app.kubernetes.io/name: selfheal-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selfheal-test
  template:
    metadata:
      labels:
        app: selfheal-test
        app.kubernetes.io/name: selfheal-test
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: memhog
        image: python:3.12-alpine
        command:
        - python
        - -c
        - a = bytearray(600 * 1024 * 1024); import time; time.sleep(3600)
        resources:
          requests:
            memory: 320Mi
            cpu: 10m
          limits:
            memory: 768Mi
            cpu: 50m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

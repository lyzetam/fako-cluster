apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ginger-hoa-secrets
  namespace: ginger-hoa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: ginger-hoa-secrets
    creationPolicy: Owner
  data:
    # Ollama Cloud bearer token (ginger-hoa/ollama).
    - secretKey: api_key
      remoteRef:
        key: ginger-hoa/ollama
        property: api_key
    # Supabase (anonymized Q&A logging) — ginger-hoa/supabase.
    - secretKey: supabase_url
      remoteRef:
        key: ginger-hoa/supabase
        property: url
    - secretKey: supabase_service_key
      remoteRef:
        key: ginger-hoa/supabase
        property: service_key
    # Admin dashboard basic-auth password — ginger-hoa/admin.
    - secretKey: admin_password
      remoteRef:
        key: ginger-hoa/admin
        property: password

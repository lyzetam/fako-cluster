apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ginger-hoa-secrets
  namespace: ginger-hoa
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: ginger-hoa-secrets
    creationPolicy: Owner
  data:
    # Ollama Cloud bearer token (ginger-hoa/ollama).
    - secretKey: api_key
      remoteRef:
        key: ginger-hoa/ollama
        property: api_key

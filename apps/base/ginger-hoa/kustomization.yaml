apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ginger-hoa
resources:
  - namespace.yaml
  - secret-store.yaml
  - external-secret.yaml
  - external-secret-dockerhub.yaml
  - deployment.yaml
  - service.yaml
  - cloudflare.yaml
# Note: aws-credentials (SOPS-encrypted) lives in the staging overlay, like other apps,
# because it is environment-specific.

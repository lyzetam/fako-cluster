# Materializes a dockerhub imagePullSecret from AWS Secrets Manager so the cluster can
# pull the private lzetam/ginger-hoa image (and avoid anonymous pull-rate limits).
# Pattern matches apps/base/soccer-banter/external-secret-dockerhub.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-registry
  namespace: ginger-hoa
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: dockerhub-registry
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub/credentials
        property: token
  refreshInterval: 1h

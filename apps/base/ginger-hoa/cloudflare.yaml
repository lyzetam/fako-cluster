# Cloudflare Tunnel exposing ginger-hoa at https://ginger.lztechnology.io
# Tunnel "ginger-hoa" (id 6e410aba-cf7c-4fc8-beb1-ec74c942f18f); DNS CNAME
# ginger -> <id>.cfargotunnel.com (proxied). Credentials live in the SOPS-encrypted
# tunnel-credentials secret (staging overlay). Pattern matches apps/base/soccer-banter.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ginger-hoa
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.11.1
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: creds
          secret:
            secretName: tunnel-credentials
        - name: config
          configMap:
            name: cloudflared
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: ginger-hoa
data:
  config.yaml: |
    tunnel: 6e410aba-cf7c-4fc8-beb1-ec74c942f18f
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: ginger.lztechnology.io
        service: http://ginger-hoa:8000
      - service: http_status:404

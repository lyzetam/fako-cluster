# Adopted into GitOps 2026-07-22 from manual kubectl applies (source repo
# ~/dev/alpha-scribe/k8s/). Cluster state was the source of truth — adoption
# only, no behavior changes.
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: alpha-scribe
    schedule: morning
  name: alpha-scribe-morning
  namespace: quantum-trades
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: alpha-scribe
        schedule: morning
    spec:
      backoffLimit: 2
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app: alpha-scribe
            schedule: morning
        spec:
          containers:
          - command:
            - python
            - -m
            - app.main
            - scan
            - --limit=10
            - --min-score=0.6
            - --profile=content
            - -v
            env:
            - name: SIGNALS_URL
              value: http://signals-service:8002
            - name: MARKET_DATA_URL
              value: http://market-data-api:8007
            - name: DATA_DIR
              value: /data
            envFrom:
            - secretRef:
                name: alpha-scribe-secrets
            - configMapRef:
                name: alpha-scribe-config
            image: lzetam/alpha-scribe:latest
            imagePullPolicy: Always
            name: scanner
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              runAsUser: 1000
            volumeMounts:
            - mountPath: /data
              name: data
          imagePullSecrets:
          - name: dockerhub-registry
          initContainers:
          - command:
            - sh
            - -c
            - "echo \"Checking signals service...\"\nfor i in 1 2 3 4 5; do\n  wget\
              \ -q --timeout=5 --spider http://signals-service:8002/health && break\n\
              \  echo \"Retry $i: signals not ready...\"\n  sleep 5\ndone\nwget -q\
              \ --spider http://signals-service:8002/health || exit 1\necho \"Signals\
              \ service healthy!\"\n"
            image: busybox:1.36
            imagePullPolicy: IfNotPresent
            name: check-signals-service
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          restartPolicy: Never
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: alpha-scribe-data
      ttlSecondsAfterFinished: 86400
  schedule: 15 14 * * 1-5
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  suspend: false


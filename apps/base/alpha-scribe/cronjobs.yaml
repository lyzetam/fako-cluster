      activeDeadlineSeconds: 600
      backoffLimit: 2
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app: alpha-scribe
            schedule: evaluate
            signal-type: evaluation
        spec:
          containers:

---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: alpha-scribe
    schedule: news
  name: alpha-scribe-news
  namespace: quantum-trades
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: alpha-scribe
        schedule: news
    spec:
      backoffLimit: 2
      completions: 1
      parallelism: 1
      template:
        metadata:
          labels:
            app: alpha-scribe
            schedule: news
        spec:
          containers:
          - command:
            - python
            - -m
            - app.main
            - scan-news
            - --symbols=AAPL,MSFT,GOOGL,AMZN,META,NVDA,TSLA,AMD,INTC,CRM
            - --limit=8
            - --max-articles=10
            - -v
            env:
            - name: QUANTUM_TRADES_URL
              value: http://backend-service:8000
            - name: SIGNALS_URL
              value: http://signals-service:8002
            - name: MARKET_DATA_URL
              value: http://market-data-api:8007
            - name: DATA_DIR
              value: /data
            - name: AGENTS_URL
              value: http://agents:8006
            envFrom:
            - secretRef:
                name: alpha-scribe-secrets
            - configMapRef:
                name: alpha-scribe-config
            image: lzetam/alpha-scribe:latest
            imagePullPolicy: Always
            name: news-scanner
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              runAsUser: 1000
            volumeMounts:
            - mountPath: /data
              name: data
          imagePullSecrets:
          - name: dockerhub-registry
          initContainers:
          - command:
            - sh
            - -c
            - "echo \"Checking backend service...\"\nfor i in 1 2 3 4 5; do\n  wget\
              \ -q --timeout=5 --spider http://backend-service:8000/api/health &&\
              \ break\n  echo \"Retry $i: backend not ready...\"\n  sleep 5\ndone\n\
              wget -q --spider http://backend-service:8000/api/health || exit 1\n\
              echo \"Backend service healthy!\"\n"
            env:
            - name: AGENTS_URL
              value: http://agents:8006
            image: busybox:1.36
            imagePullPolicy: IfNotPresent
            name: check-backend-service
            resources: {}
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
          restartPolicy: Never
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: alpha-scribe-data
      ttlSecondsAfterFinished: 86400
  schedule: 0 12,16,21 * * 1-5
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  suspend: false
  timeZone: America/New_York


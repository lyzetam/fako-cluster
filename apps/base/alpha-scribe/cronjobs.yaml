                drop:
                - ALL
              readOnlyRootFilesystem: false
              runAsNonRoot: true
              runAsUser: 1000
            volumeMounts:
            - mountPath: /data
              name: data
          imagePullSecrets:
          - name: dockerhub-registry
          restartPolicy: Never
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: alpha-scribe-data
      ttlSecondsAfterFinished: 86400
  schedule: 30 21 * * 1-5
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  suspend: false

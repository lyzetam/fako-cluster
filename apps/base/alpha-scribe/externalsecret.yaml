# Adopted into GitOps 2026-07-22 from manual kubectl applies (source repo
# ~/dev/alpha-scribe/k8s/). Cluster state was the source of truth — adoption
# only, no behavior changes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app: alpha-scribe
  name: alpha-scribe-secrets
  namespace: quantum-trades
spec:
  data:
  # NOTE: maps quantum-trades/api-keys.ANTHROPIC_API_KEY — key DISABLED 2026-07-21;
  # alpha-scribe LLM calls will fail until migrated to Ollama Cloud (tracked separately).
  - remoteRef:
      key: quantum-trades/api-keys
      property: ANTHROPIC_API_KEY
    secretKey: ANTHROPIC_API_KEY
  - remoteRef:
      key: alpha-scribe/api
      property: API_KEY
    secretKey: API_KEY
  - remoteRef:
      key: alpha-scribe/discord
      property: webhooks.signals
    secretKey: DISCORD_WEBHOOK_SIGNALS
  - remoteRef:
      key: alpha-scribe/discord
      property: webhooks.news
    secretKey: DISCORD_WEBHOOK_NEWS
  - remoteRef:
      key: alpha-scribe/discord
      property: webhooks.day_options
    secretKey: DISCORD_WEBHOOK_DAY_OPTIONS
  - remoteRef:
      key: alpha-scribe/discord
      property: webhooks.swing_options
    secretKey: DISCORD_WEBHOOK_SWING_OPTIONS
  - remoteRef:
      key: alpha-scribe/storage
      property: bucket
    secretKey: S3_BUCKET
  - remoteRef:
      key: alpha-scribe/supabase
      property: url
    secretKey: SUPABASE_URL
  - remoteRef:
      key: alpha-scribe/supabase
      property: service_role_key
    secretKey: SUPABASE_SERVICE_KEY
  - remoteRef:
      key: alpha-scribe/tradier
      property: api_key
    secretKey: TRADIER_API_KEY
  - remoteRef:
      key: alpha-scribe/discord
      property: webhooks.scorecard
    secretKey: DISCORD_WEBHOOK_SCORECARD
  - remoteRef:
      key: obsidian/api
      property: api_url
    secretKey: OBSIDIAN_API_URL
  - remoteRef:
      key: obsidian/api
      property: api_key
    secretKey: OBSIDIAN_API_KEY
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secrets-store
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: alpha-scribe-secrets
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque

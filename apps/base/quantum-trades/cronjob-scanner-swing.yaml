# options-scanner-swing: was cluster-only (manual kubectl apply, Jan 2026) —
# adopted into GitOps 2026-07-22 after the ANTHROPIC_API_KEY secret key removal
# broke pod creation (CreateContainerConfigError). Scheduled path (app.cli.scanner)
# uses no LLM; OLLAMA_* serves manual combined_scan runs (Ollama Cloud pattern).
apiVersion: v1
data:
  BACKEND_URL: http://backend-service:8000
  DISCORD_ENABLED: 'true'
  DISCORD_MAX_POSTS: '5'
  LOG_LEVEL: INFO
  MAX_DTE: '49'
  MAX_RESULTS_PER_SYMBOL: '3'
  MAX_SYMBOLS: '150'
  MIN_DTE: '14'
  MIN_SIGNAL_STRENGTH: '40'
  OBSIDIAN_FOLDER: trading/Options/Scans
  SCORING_PROFILE: balanced
  SECTOR_SCAN_CALLS_PER_SECTOR: '5'
  SECTOR_SCAN_ENABLED: 'true'
  SECTOR_SCAN_MIN_STRENGTH: '50'
  SECTOR_SCAN_PUTS_PER_SECTOR: '5'
  SECTOR_SCAN_SECTORS: healthcare,technology,financials,energy,consumer_discretionary
  SIGNALS_SERVICE_URL: http://signals-service:8002
  STRATEGY: long_option
  SYMBOL_LISTS: tech_mega,sp500_top50,popular_options,etf_major,dividend_aristocrats
  TRADING_STYLE: swing
kind: ConfigMap
metadata:
  name: options-scanner-swing-config
  namespace: quantum-trades
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: options-scanner-swing
  namespace: quantum-trades
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - env:
            - name: MASSIVE_API_KEY
              valueFrom:
                secretKeyRef:
                  key: MASSIVE_API_KEY
                  name: quantum-trades-secrets
            - name: OBSIDIAN_API_URL
              valueFrom:
                secretKeyRef:
                  key: api_url
                  name: obsidian-api
            - name: OBSIDIAN_API_KEY
              valueFrom:
                secretKeyRef:
                  key: api_key
                  name: obsidian-api
            - name: DISCORD_WEBHOOK_SWING_OPTIONS
              valueFrom:
                secretKeyRef:
                  key: DISCORD_WEBHOOK_SWING_OPTIONS
                  name: alpha-scribe-secrets
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quantum-trades-secrets
                  key: OLLAMA_API_KEY
            - name: OLLAMA_MODEL
              value: glm-5.2
            envFrom:
            - configMapRef:
                name: options-scanner-swing-config
            - secretRef:
                name: alpha-scribe-secrets
            image: lzetam/quantum-trades-scanner:latest
            imagePullPolicy: Always
            name: scanner
            resources:
              limits:
                cpu: '1'
                memory: 1Gi
              requests:
                cpu: 200m
                memory: 512Mi
          imagePullSecrets:
          - name: dockerhub-registry
          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 86400
  schedule: 0 6,10,15 * * 1-5
  successfulJobsHistoryLimit: 5
  suspend: false
  timeZone: America/New_York

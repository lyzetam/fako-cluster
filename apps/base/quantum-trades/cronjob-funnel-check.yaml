# Funnel fillability check — runs ~15 min after the 08:00 ET prequalification funnel
# and confirms it produced a FRESH, FILLABLE watchlist so the autonomous entry path can
# actually fill. Posts a PASS/FAIL summary to Discord. Runs the orchestrator-qt image
# (in-cluster Supabase/Tradier/Discord secrets) with `python -m prequalification.fillability_check`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: funnel-fillability-check
  namespace: quantum-trades
  labels:
    app.kubernetes.io/name: funnel-fillability-check
    app.kubernetes.io/part-of: quantum-trades
    app.kubernetes.io/managed-by: flux
spec:
  # 09:00 ET on weekdays. Moved 08:15->09:00 (2026-07-14): the prequal funnel can now
  # retry (backoffLimit:2, up to ~40 min/attempt), so an 08:15 check raced an unfinished
  # funnel and posted a false FAIL. 09:00 lets prequal (incl. one retry) settle first,
  # and still alerts ~30 min before the 09:30 open.
  # 10:15 ET — moved 09:00->10:15 (2026-07-15) to run AFTER the 09:45 post-open
  # fallback (+retries) settles, so it checks the day's final universe, not a
  # mid-rebuild one.
  schedule: "15 10 * * 1-5"
  timeZone: "America/New_York"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 0
      # Raised 300->600 (2026-07-14): the check makes up to 8 Tradier expiration calls;
      # a slow-premarket Tradier could exceed 300s and K8s SIGKILL the pod BEFORE it
      # posts the PASS/FAIL to Discord — i.e. the alert silently never fired. 600s
      # guarantees the Discord post (the real signal) completes.
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: funnel-fillability-check
              image: lzetam/quantum-trades-orchestrator-qt:latest
              imagePullPolicy: Always
              command: ["python", "-m", "prequalification.fillability_check"]
              # SUPABASE_URL/KEY, Tradier creds, and the Discord webhook all come from
              # the secret the live orchestrator-qt deployment already uses.
              envFrom:
                - secretRef:
                    name: orchestrator-qt-secrets
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false

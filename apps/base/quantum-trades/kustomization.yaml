apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: quantum-trades
resources:
  - namespace.yaml
  - configmap.yaml
  - secret-store.yaml
  - external-secret.yaml
  - pvc-scan-results.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - signals-deployment.yaml
  - technicals-deployment.yaml
  - strategies-deployment.yaml
  - backtesting-deployment.yaml
  - trading-deployment.yaml
  - services.yaml
  - ingress.yaml
  # WebSocket IngressRoute with extended timeouts
  - middleware-websocket.yaml
  - ingressroute-websocket.yaml
  # Options Scanner CronJob
  - external-secret-obsidian.yaml
  - configmap-scanner.yaml
  - cronjob-scanner.yaml
  # Trade Journal Sync CronJob (hourly)
  - cronjob-journal-sync.yaml
  # Pre-Qualification Agent — premarket whole-market funnel (8am ET)
  - cronjob-prequalification.yaml
  # Pre-Qualification FALLBACK — post-open re-run (9:45am ET) guarantees a universe
  # when the 8am premarket run crashes (recurring 2026-07-13/14/15)
  - cronjob-prequalification-fallback.yaml
  # Funnel fillability check — confirms the funnel produced a fillable watchlist (10:15am ET)
  - cronjob-funnel-check.yaml
  # Orchestrator-QT - LangGraph Trading Coordinator
  - redis-orchestrator-qt.yaml
  - configmap-orchestrator-qt.yaml
  - external-secret-orchestrator-qt.yaml
  - orchestrator-qt-deployment.yaml

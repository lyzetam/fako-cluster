# Pre-Qualification Agent — premarket whole-market funnel.
# Narrows the whole optionable market -> the day's watchlist + universe_meta
# marker. The trading loop's freshness gate opens entries once a fresh universe
# exists for today. Runs the orchestrator-qt image with `python -m prequalification`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prequalification
  namespace: quantum-trades
  labels:
    app.kubernetes.io/name: prequalification
    app.kubernetes.io/part-of: quantum-trades
    app.kubernetes.io/managed-by: flux
spec:
  # 08:00 ET on weekdays — ~1.5h before the 09:30 open.
  schedule: "0 8 * * 1-5"
  timeZone: "America/New_York"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 10
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      # Retry transient failures (2026-07-14): the funnel failed 2 consecutive days
      # from margin fragility — a slow-upstream run blows the app timeout, or an
      # early transient crash exits non-zero. backoffLimit 0 lost the whole trading
      # day on the first hiccup (stale universe -> all entries blocked silently).
      # backoffLimit 2 retries a transient/slow run. A genuine floor-abort exits 0
      # (persist returns False, keeps prior watchlist) so it is NOT retried.
      backoffLimit: 2
      # K8s backstop for any process-level hang the app timeout can't catch. Sized
      # just above the per-attempt app timeout (PREQUAL_RUN_TIMEOUT_SECONDS=7200) so
      # the app timeout trips first on attempt 1. Raised 5400->7500 (2026-07-14) for
      # the 2h headroom. backoffLimit:2 retries cover FAST crashes (which finish in
      # minutes, leaving ample budget); a genuine full-2h run/hang is caught here and
      # not retried (retrying a 2h hang wouldn't produce a universe that day anyway).
      activeDeadlineSeconds: 7500
      template:
        spec:
          # Never (was OnFailure) so each backoffLimit retry is a SEPARATE pod that
          # is RETAINED on failure (OnFailure restarts in-place and the failed pod
          # gets GC'd before its logs can be read). The 08:00 premarket run has
          # crashed 3 days running (2026-07-13/14/15) — same funnel SUCCEEDS mid-day,
          # so it's premarket-specific — but every failed pod GC'd before the
          # traceback could be captured. Never + failedJobsHistoryLimit:5 keeps the
          # pods so `kubectl logs` finally reveals the crash. Belt: a 09:45 fallback
          # CronJob (cronjob-prequalification-fallback.yaml) guarantees a universe
          # even when 08:00 crashes.
          restartPolicy: Never
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: prequalification
              image: lzetam/quantum-trades-orchestrator-qt:latest
              imagePullPolicy: Always
              command: ["python", "-m", "prequalification"]
              # SUPABASE_URL / SUPABASE_KEY (+ agent secrets) from the secret the
              # live orchestrator-qt deployment already uses.
              envFrom:
                - secretRef:
                    name: orchestrator-qt-secrets
              env:
                - name: MASSIVE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: quantum-trades-secrets
                      key: MASSIVE_API_KEY
                - name: SIGNALS_SERVICE_URL
                  value: "http://signals-service:8002"
                - name: PYTHONUNBUFFERED
                  value: "1"
                # Whole-funnel app timeout. Raised 600->1200->2400->7200: the per-name
                # signal stage (500 tickers, batches of 10) runs 10-21 min against the
                # old caps; upstream-latency variance blew them and left the universe
                # stale -> loop blocked all entries (2 days, 2026-07-13/14). 7200 (2h)
                # gives a slow-but-progressing run all the room it needs to finish.
                # Real fix is parallelizing the stage-4 signal calls (~15min->~3min) — filed.
                - name: PREQUAL_RUN_TIMEOUT_SECONDS
                  value: "7200"
                # Min committed universe size. Lowered 20->10 (2026-07-10): the
                # option-liquidity fillability gate (OI>=500, 14-28 DTE, <=8% OTM,
                # <=5% spread) culls ~252 technically-actionable names to ~13/day —
                # the survivors are the genuinely-fillable subset, so accept them
                # rather than abort. NOTE: the aggressive 252->13 cull is the real
                # tuning lever (loosen prequal_min_option_oi for a wider universe) —
                # tracked as a follow-up; this floor keeps the loop fed meanwhile.
                - name: PREQUAL_MIN_UNIVERSE
                  value: "10"
                # Funnel option-LIQUIDITY floor. Loosened 500->250 (2026-07-10): OI>=500
                # in the 14-28 DTE / <=8% OTM window culled 252 technically-actionable
                # names to ~13/day, starving opportunity flow (~1 signal/cycle, unfillable).
                # This is only a PRE-screen — the executor still per-contract-gates every
                # fill (spread<=5%, min premium, DTE, strike), so a looser funnel adds
                # candidates without risking bad fills. Widens the daily universe.
                - name: PREQUAL_MIN_OPTION_OI
                  value: "250"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false

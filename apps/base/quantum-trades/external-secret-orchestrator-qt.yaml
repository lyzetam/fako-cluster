apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orchestrator-qt-secrets-sync
  namespace: quantum-trades
spec:
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: orchestrator-qt-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # ANTHROPIC mapping removed 2026-07-21 — audits run on Ollama Cloud; the
    # dedicated ORCHESTRATOR_QT_ANTHROPIC key is being disabled. An absent env
    # var makes the factory SKIP the provider at build time (clean, no stall).
    - secretKey: OLLAMA_API_KEY
      remoteRef:
        key: ollama-webui/ollama-cloud-api-key
        property: api_key  # SM value is JSON {"api_key": ...} — without this the
                           # pod env gets the raw JSON blob -> Bearer {json} -> 401
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: quantum-trades/api-keys
        property: OPENAI_API_KEY
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: quantum-trades/api-keys
        property: GOOGLE_API_KEY
    - secretKey: MASSIVE_API_KEY
      remoteRef:
        key: quantum-trades/api-keys
        property: MASSIVE_API_KEY
    - secretKey: AGENTS_API_KEY
      remoteRef:
        key: quantum-trades/api-keys
        property: AGENTS_API_KEY
    # Mode-specific Tradier credentials. The orchestrator-qt code picks
    # which set to use based on TRADING_MODE in the deployment env.
    - secretKey: TRADIER_LIVE_API_KEY
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_LIVE_API_KEY
    - secretKey: TRADIER_LIVE_ACCOUNT_ID
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_LIVE_ACCOUNT_ID
    - secretKey: TRADIER_SANDBOX_API_KEY
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_SANDBOX_API_KEY
    - secretKey: TRADIER_SANDBOX_ACCOUNT_ID
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_SANDBOX_ACCOUNT_ID
    # Legacy fallback — kept for backwards compat. Currently maps to sandbox
    # values in AWS Secrets Manager.
    - secretKey: TRADIER_API_KEY
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_API_KEY
    - secretKey: TRADIER_ACCOUNT_ID
      remoteRef:
        key: quantum-trades/trading
        property: TRADIER_ACCOUNT_ID
    - secretKey: ALPACA_API_KEY
      remoteRef:
        key: quantum-trades/alpaca
        property: ALPACA_API_KEY
    - secretKey: ALPACA_SECRET_KEY
      remoteRef:
        key: quantum-trades/alpaca
        property: ALPACA_SECRET_KEY
    - secretKey: OBSIDIAN_API_KEY
      remoteRef:
        key: obsidian/api
        property: api_key
    - secretKey: SUPABASE_URL
      remoteRef:
        key: quantum-trades/supabase
        property: url
    - secretKey: SUPABASE_KEY
      remoteRef:
        key: quantum-trades/supabase
        property: service_role_key
    - secretKey: DISCORD_WEBHOOK_LEARNING
      remoteRef:
        key: discord/webhook
        property: quantum_learning
  refreshInterval: 1h

apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: autobots
type: Opaque
data:
  access-key-id: ""
  secret-access-key: ""
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: autobots
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key

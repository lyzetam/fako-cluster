apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobots-db
  namespace: autobots
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: autobots-db
    creationPolicy: Owner
  data:
    # Direct Supabase Postgres connection — LangGraph PostgresStore for agent belief memory
    - secretKey: AUTOBOTS_DB_URI
      remoteRef:
        key: autobots/supabase-db
        property: db_url

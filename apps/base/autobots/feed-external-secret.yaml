apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobots-supabase
  namespace: autobots
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: autobots-supabase
    creationPolicy: Owner
  data:
    - secretKey: AUTOBOTS_SUPABASE_URL
      remoteRef:
        key: autobots/supabase
        property: url
    - secretKey: AUTOBOTS_SUPABASE_SERVICE_KEY
      remoteRef:
        key: autobots/supabase
        property: service_role_key

apiVersion: apps/v1
kind: Deployment
metadata:
  name: autobots-feed
  namespace: autobots
  labels:
    app.kubernetes.io/name: autobots-feed
    app.kubernetes.io/part-of: autobots
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autobots-feed
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autobots-feed
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      containers:
        - name: feed
          image: lzetam/autobots-agents:latest
          imagePullPolicy: Always
          command: ["python", "-m", "autobots.feed"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: autobots-supabase
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 250m, memory: 256Mi}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

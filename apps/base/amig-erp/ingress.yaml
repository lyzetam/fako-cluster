apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amig-erp
  namespace: amig-erp
  labels:
    app: amig-erp
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/redirect-entry-point: https
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/custom-response-headers: |
      X-Frame-Options: DENY
      X-Content-Type-Options: nosniff
      Referrer-Policy: strict-origin-when-cross-origin
      Strict-Transport-Security: max-age=31536000; includeSubDomains
      Permissions-Policy: geolocation=(), microphone=(), camera=()
spec:
  tls:
    - hosts:
        - amig-erp.lztechnology.io
      secretName: amig-erp-tls
  rules:
    - host: amig-erp.lztechnology.io
      http:
        paths:
          # Next.js rewrite handles /api/backend/* → backend internally,
          # so the ingress just needs to route everything to the web service.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: amig-erp-web
                port:
                  number: 80

# ERPNext + MariaDB credentials for the AMIG demo deployment.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: erpnext-secrets
  namespace: amig-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secrets-store
  target:
    name: erpnext-secrets
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: amig-erp/database
        property: ERPNEXT_ADMIN_PASSWORD
    - secretKey: MARIADB_ROOT_PASSWORD
      remoteRef:
        key: amig-erp/database
        property: MARIADB_ROOT_PASSWORD

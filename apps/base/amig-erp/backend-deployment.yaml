apiVersion: apps/v1
kind: Deployment
metadata:
  name: amig-erp-backend
  namespace: amig-erp
  labels:
    app: amig-erp-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: amig-erp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: amig-erp-backend
  template:
    metadata:
      labels:
        app: amig-erp-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: amig-erp
    spec:
      containers:
        - name: backend
          image: lzetam/amig-erp-backend:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: CORS_ORIGINS
              value: "https://amig-erp.lztechnology.io"
            - name: COMPANY_NAME
              value: "AMIG GROUP"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "120"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: amig-erp-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: amig-erp-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: dockerhub-registry
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: amig-erp-web
  namespace: amig-erp
  labels:
    app: amig-erp-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: amig-erp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: amig-erp-web
  template:
    metadata:
      labels:
        app: amig-erp-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: amig-erp
    spec:
      containers:
        - name: web
          image: lzetam/amig-erp-web:v0.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            # Next.js rewrites /api/backend/* → BACKEND_URL at server side, so
            # the browser only ever calls the public host — no NEXT_PUBLIC_API_URL needed.
            - name: BACKEND_URL
              value: "http://amig-erp-backend.amig-erp.svc.cluster.local:8000"
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 384Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: dockerhub-registry
      restartPolicy: Always

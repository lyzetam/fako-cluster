# apps/base/amig-erp/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: amig-erp
resources:
  - namespace.yaml
  - secret-store.yaml
  - external-secret.yaml
  - external-secret-dockerhub.yaml
  - backend-deployment.yaml
  - web-deployment.yaml
  - services.yaml
  # External access via dedicated Cloudflare tunnel (no ingress / cert-manager
  # needed — TLS terminated at Cloudflare edge).
  - cloudflared.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: open-webui-configmap
  namespace: open-webui
data:
  # Ollama API - Ollama cloud only
  ENABLE_OLLAMA_API: "true"
  OLLAMA_BASE_URL: "https://api.ollama.com"

  # Disable OpenAI API - using Ollama cloud instead
  ENABLE_OPENAI_API: "false"

  # WebUI configuration
  WEBUI_NAME: "aiwithlandry"
  WEBUI_URL: "https://ai.lztechnology.io"

  # Database configuration
  DATABASE_URL: "sqlite:////app/backend/data/webui.db"
  DATA_DIR: "/app/backend/data"

  # Model configuration
  DEFAULT_MODELS: "deepseek-v3.2"
  BYPASS_MODEL_ACCESS_CONTROL: "true"

  # Authentication settings
  WEBUI_AUTH: "true"
  ENABLE_SIGNUP: "true"
  DEFAULT_USER_ROLE: "pending"
  DEFAULT_GROUP_ID: "d14072f6-fa5e-438c-a047-1b22926788eb"  # Students group
  WEBUI_SESSION_LIFETIME: "7776000"  # 90 days (semester length)
  ENABLE_PASSWORD_VALIDATION: "true"

  # User permissions — lock down for classroom safety
  USER_PERMISSIONS_CHAT_DELETION: "true"
  USER_PERMISSIONS_CHAT_EXPORT: "true"
  ENABLE_COMMUNITY_SHARING: "false"
  SHOW_ADMIN_DETAILS: "false"

  # Disable features students don't need
  ENABLE_IMAGE_GENERATION: "false"
  ENABLE_RAG_WEB_SEARCH: "false"

  # Logging
  WEBUI_LOG_LEVEL: "INFO"

  # Request timeout for large model responses
  OPENAI_REQUEST_TIMEOUT: "600"

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ollama-cloud-api-secret
  namespace: open-webui
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: ollama-cloud-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        OLLAMA_API_KEY: "{{ .apiKey }}"
  data:
  - secretKey: apiKey
    remoteRef:
      key: ollama-webui/ollama-cloud-api-key
      property: api_key
  refreshInterval: 1h

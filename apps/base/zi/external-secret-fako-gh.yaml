# GitHub token for Sol (k8s-engineer) to open GitOps fix PRs via propose_fix_pr.
# Sourced from the MCP gateway's token in AWS Secrets Manager and mounted ONLY on
# the k8s-engineer pod (not the shared zi-secrets every agent gets), to scope the
# write-capable credential to the one agent that needs it.
# NOTE: this reuses the broad gateway PAT; a dedicated fine-grained PAT scoped to
# fako-cluster (contents:write, pull_requests:write) is the follow-up hardening.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fako-gh-token
  namespace: zi
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secret-store
  target:
    name: fako-gh-token
    creationPolicy: Owner
  data:
    - secretKey: ZI_FAKO_GH_TOKEN
      remoteRef:
        key: mcp-gateway/github-token
        property: token

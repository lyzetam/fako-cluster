apiVersion: apps/v1
kind: Deployment
metadata:
  name: zi
  namespace: zi
  labels:
    app.kubernetes.io/name: zi
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zi
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: zi
      imagePullSecrets:
        - name: dockerhub-registry
      initContainers:
        - name: setup-brain-storage
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /data/brain/zi/journal /data/brain/skills
              chmod -R 777 /data/brain
          volumeMounts:
            - name: brain-storage
              mountPath: /data/brain
      containers:
        - name: zi
          image: lzetam/zi:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ZI_HOST
              value: "0.0.0.0"
            - name: ZI_PORT
              value: "8080"
            - name: ZI_BRAIN_URL
              value: "http://zi-brain:8100"
            - name: ZI_REDIS_HOST
              value: "redis"
            - name: ZI_REDIS_PORT
              value: "6379"
            - name: ZI_OLLAMA_URL
              value: "http://ms2.landryzetam.net:11434"
            - name: ZI_AGENT_MEMORY_PATH
              value: "/data/agents"
            - name: ZI_AGENT_CONFIG_PATH
              value: "/config/agents.yaml"
            - name: ZI_BRAIN_PATH
              value: "/data/brain"
            - name: ZI_AUDIT_ENABLED
              value: "true"
            - name: ZI_PROACTIVE_ENABLED
              value: "true"
            - name: ZI_SKILLS_DIR
              value: "/data/brain/skills"
            # MCP Gateway (tool integration via SSE)
            - name: ZI_MCP_GATEWAY_URL
              value: "http://mcp-gateway.mcp-gateway.svc.cluster.local:8811"
            # Langfuse LLM observability
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-agent-keys
                  key: public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-agent-keys
                  key: secret_key
            - name: LANGFUSE_BASE_URL
              value: "http://langfuse-web.langfuse.svc:3000"
          envFrom:
            - secretRef:
                name: zi-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            # Brain storage for journal and second-brain data
            - name: brain-storage
              mountPath: /data/brain
            # Agent config
            - name: agent-config
              mountPath: /config
              readOnly: true
            # Shared agent memory (single RWX PVC with per-agent subdirectories)
            - name: agents-memory
              mountPath: /data/agents
      volumes:
        # Brain storage for journal and data
        - name: brain-storage
          persistentVolumeClaim:
            claimName: zi-brain-storage
        # Agent config from ConfigMap
        - name: agent-config
          configMap:
            name: zi-config
        # Shared agent memory (single RWX PVC)
        - name: agents-memory
          persistentVolumeClaim:
            claimName: zi-agents-memory

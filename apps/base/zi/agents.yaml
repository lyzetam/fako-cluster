---
# ── k8s-engineer ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-k8s-engineer
  namespace: zi
  labels:
    app.kubernetes.io/name: agent-k8s-engineer
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: zi-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-k8s-engineer
  template:
    metadata:
      labels:
        app: agent-k8s-engineer
        app.kubernetes.io/name: agent-k8s-engineer
        app.kubernetes.io/component: agent
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: lzetam/zi-agent-k8s-engineer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: AGENT_NAME
              value: "k8s-engineer"
            - name: AGENT_MODEL
              value: "glm-4.7-flash:latest"
            - name: AGENT_DESCRIPTION
              value: "Kubernetes deployment, cluster management, container orchestration, and cloud native architecture"
            # Bumped 15→20 (recursion_limit=iter*2=40): the multi-step read-only
            # sweep + deepagents planning overhead hit the old 30-step ceiling.
            # Sol runs multi-step delegated remediation loops — bump the budget
            # (remediation is not real-time; a converging loop can need minutes).
            - name: AGENT_MAX_ITERATIONS
              value: "40"
            - name: ZI_OLLAMA_TIMEOUT
              value: "600"
            # Pulse ON for the Weekly report → #engineering-team (no Continuous
            # task, so this only fires Daily/Weekly — low frequency).
            - name: ZI_PULSE_ENABLED
              value: "true"
            - name: ZI_BRAIN_URL
              value: "http://zi-brain.zi.svc.cluster.local:8100"
            # Static distribution across ms1/ms2/ms3 (no failover; LB is the resilience upgrade)
            - name: ZI_OLLAMA_URL
              value: "http://ms2.landryzetam.net:11434"
            - name: ZI_KNOWLEDGE_REDIS_HOST
              value: "redis.zi.svc.cluster.local"
            - name: ZI_KNOWLEDGE_REDIS_PORT
              value: "6379"
            - name: ZI_API_URL
              value: "http://zi.zi.svc.cluster.local:8080"
            # GitOps repo that propose_fix_pr opens fix PRs against.
            - name: ZI_FAKO_REPO
              value: "lyzetam/fako-cluster"
          envFrom:
            - secretRef:
                name: zi-secrets
            # ZI_FAKO_GH_TOKEN — write token scoped to Sol only (external-secret-fako-gh.yaml).
            - secretRef:
                name: fako-gh-token
          volumeMounts:
            - name: agent-memory
              mountPath: /data
              subPath: k8s-engineer
          resources:
            requests:
              cpu: 5m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: agent-memory
          persistentVolumeClaim:
            claimName: zi-agents-memory
---
apiVersion: v1
kind: Service
metadata:
  name: agent-k8s-engineer
  namespace: zi
  labels:
    app.kubernetes.io/name: agent-k8s-engineer
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: zi-agents
spec:
  selector:
    app: agent-k8s-engineer
  ports:
    - port: 8000
      targetPort: http
      name: http

---
# ── platform-sre ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-platform-sre
  namespace: zi
  labels:
    app.kubernetes.io/name: agent-platform-sre
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: zi-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-platform-sre
  template:
    metadata:
      labels:
        app: agent-platform-sre
        app.kubernetes.io/name: agent-platform-sre
        app.kubernetes.io/component: agent
    spec:
      imagePullSecrets:
        - name: dockerhub-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: lzetam/zi-agent-platform-sre:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: AGENT_NAME
              value: "platform-sre"
            - name: AGENT_MODEL
              value: "glm-4.7-flash:latest"
            - name: AGENT_DESCRIPTION
              value: "Platform reliability, infrastructure operations, and SRE practices"
            # Bumped 15→20 (recursion_limit=iter*2=40): the multi-step read-only
            # sweep + deepagents planning overhead hit the old 30-step ceiling.
            - name: AGENT_MAX_ITERATIONS
              value: "20"
            - name: ZI_BRAIN_URL
              value: "http://zi-brain.zi.svc.cluster.local:8100"
            # Static distribution across ms1/ms2/ms3 (no failover; LB is the resilience upgrade)
            - name: ZI_OLLAMA_URL
              value: "http://ms2.landryzetam.net:11434"
            - name: ZI_KNOWLEDGE_REDIS_HOST
              value: "redis.zi.svc.cluster.local"
            - name: ZI_KNOWLEDGE_REDIS_PORT
              value: "6379"
            - name: ZI_API_URL
              value: "http://zi.zi.svc.cluster.local:8080"
            # Watchtower: Noor runs a Continuous read-only health sweep every
            # ZI_PULSE_CHECK_INTERVAL seconds and delegates reversible fixes to
            # Sol (k8s-engineer). Enabled ONLY on platform-sre. The autonomous
            # safety gate limits delegated Sol runs to read-only + rollout
            # restart; all destructive kubectl is refused.
            - name: ZI_PULSE_ENABLED
              value: "true"
            - name: ZI_PULSE_CHECK_INTERVAL
              value: "900"
            # Watchtower posts cluster-health issues to #infrastructure (only on
            # real problems, deduped). Weekly report defaults to #engineering-team.
            - name: ZI_PULSE_REPORT_CHANNEL
              value: "infrastructure"
            # Deterministic Python self-heal pipeline DISABLED — remediation
            # pivoted to skill-driven Sol (k8s-engineer): Noor detects and
            # delegates, Sol acts via the sre-remediation skill + his tools.
            # Kept as an off-by-default kill switch; the Python modules are slated
            # for removal in a follow-up cleanup.
            - name: ZI_SELF_HEAL_ENABLED
              value: "false"
            # delegate_task to Sol BLOCKS until his (slow, minutes-long)
            # remediation run finishes; the a2a call must outlast it.
            - name: ZI_A2A_TIMEOUT
              value: "1200"
          envFrom:
            - secretRef:
                name: zi-secrets
          volumeMounts:
            - name: agent-memory
              mountPath: /data
              subPath: platform-sre
          resources:
            requests:
              cpu: 5m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: agent-memory
          persistentVolumeClaim:
            claimName: zi-agents-memory
---
apiVersion: v1
kind: Service
metadata:
  name: agent-platform-sre
  namespace: zi
  labels:
    app.kubernetes.io/name: agent-platform-sre
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: zi-agents
spec:
  selector:
    app: agent-platform-sre
  ports:
    - port: 8000
      targetPort: http
      name: http

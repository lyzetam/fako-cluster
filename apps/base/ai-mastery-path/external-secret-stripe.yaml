apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stripe-secret
  namespace: ai-mastery-path
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: stripe-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: ai-mastery-path/stripe
        property: secret_key
  refreshInterval: 1h

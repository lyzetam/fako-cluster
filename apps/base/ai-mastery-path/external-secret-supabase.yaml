apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-secret
  namespace: ai-mastery-path
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: supabase-secrets
    creationPolicy: Owner
  data:
    - secretKey: service_role_key
      remoteRef:
        key: ai-mastery-path/supabase
        property: service_role_key
  refreshInterval: 1h

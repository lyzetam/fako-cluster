apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-news-storage
  namespace: ai-news
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secret-store
  target:
    name: ai-news-storage
    creationPolicy: Owner
  data:
    - secretKey: S3_BUCKET
      remoteRef:
        key: ai-news/storage
        property: bucket
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: ai-news/storage
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: ai-news/storage
        property: secret_access_key

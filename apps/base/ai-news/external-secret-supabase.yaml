apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-news-supabase
  namespace: ai-news
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secret-store
  target:
    name: ai-news-supabase
    creationPolicy: Owner
  data:
    - secretKey: SUPABASE_URL
      remoteRef:
        key: ai-news/supabase
        property: url
    - secretKey: SUPABASE_KEY
      remoteRef:
        key: ai-news/supabase
        property: service_role_key

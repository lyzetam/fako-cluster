apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-news-discord
  namespace: ai-news
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secret-store
  target:
    name: ai-news-discord
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: ai-news/discord
        property: webhook_url
    - secretKey: DISCORD_WEBHOOK_NEWS
      remoteRef:
        key: ai-news/discord
        property: webhook_news
    - secretKey: DISCORD_WEBHOOK_BREAKTHROUGH
      remoteRef:
        key: ai-news/discord
        property: webhook_breakthrough

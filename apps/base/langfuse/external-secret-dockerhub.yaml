# Materializes a dockerhub-registry imagePullSecret from AWS Secrets Manager.
# Pattern matches apps/base/claude-code/external-secret-dockerhub.yaml.
#
# Why: langfuse pulls langfuse/langfuse and clickhouse images from Docker Hub.
# Without an authenticated pull, anonymous quota (~100 pulls/6h per IP) is
# easily exhausted after node reboots — we hit this on 2026-05-13 when
# aitower returned to service and pulled every image fresh.
#
# To make pods use this secret, set imagePullSecrets on the relevant
# ServiceAccount (langfuse, langfuse-clickhouse, ...) — done via HelmRelease
# values or `kubectl patch sa <name> -p '{"imagePullSecrets":[{"name":"dockerhub-registry"}]}'`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-registry
  namespace: langfuse
spec:
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: dockerhub-registry
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub/credentials
        property: token
  refreshInterval: 1h

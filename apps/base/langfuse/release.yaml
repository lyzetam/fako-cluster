apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langfuse
  namespace: langfuse
spec:
  interval: 30m
  chart:
    spec:
      chart: langfuse
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: langfuse
        namespace: langfuse
  values:
    langfuse:
      salt:
        secretKeyRef:
          name: langfuse-secrets
          key: salt

      encryptionKey:
        secretKeyRef:
          name: langfuse-secrets
          key: encryption_key

      nextauth:
        url: "https://langfuse.fako.landryzetam.net"
        secret:
          secretKeyRef:
            name: langfuse-secrets
            key: nextauth_secret

      web:
        replicas: 1
        resources:
          requests:
            memory: "768Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1"
        pod:
          # V8 default heap (~512MB) was OOMing on langfuse 3.175.0 init
          # (Next.js + Prisma + MCP). Raise the heap with explicit
          # --max-old-space-size; the container limit above leaves ~500MB
          # of headroom for non-heap (V8 base, native modules, buffers).
          additionalEnv:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"

      worker:
        replicas: 1
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1"
    # External Postgres (CloudNativePG postgres-cluster)
    postgresql:
      deploy: false
      host: "postgres-cluster-rw.postgres.svc.cluster.local"
      port: 5432
      auth:
        username: "app"
        existingSecret: "langfuse-secrets"
        secretKeys:
          userPasswordKey: postgres_password
        database: "langfuse"
      migration:
        autoMigrate: true

    # ClickHouse — single node for self-hosted
    clickhouse:
      deploy: true
      shards: 1
      replicaCount: 1
      clusterEnabled: false
      auth:
        username: "default"
        existingSecret: "langfuse-secrets"
        existingSecretKey: clickhouse_password
      persistence:
        enabled: true
        size: 50Gi
      migration:
        autoMigrate: true

    # Redis — standalone mode (auth disabled, cluster-internal only)
    redis:
      deploy: true
      architecture: standalone
      cluster:
        enabled: false
      auth:
        enabled: false

    # MinIO — local S3-compatible object store
    s3:
      deploy: true
      forcePathStyle: true
      # Bundled MinIO stores its random root password in the langfuse-s3 secret,
      # but the chart leaves s3.auth empty so langfuse's blob client can't
      # authenticate (OTEL event uploads 500 "Could not load credentials from
      # any providers"). Point s3.auth at that secret — wires creds for all
      # upload types (event/media/batch) via the s3.deploy fallback.
      auth:
        existingSecret: langfuse-s3
        rootUserSecretKey: root-user
        rootPasswordSecretKey: root-password
      persistence:
        enabled: true
        size: 20Gi

    # Ingress handled separately
    ingress:
      enabled: false

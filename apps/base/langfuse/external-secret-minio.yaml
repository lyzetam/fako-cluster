apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-s3
  namespace: langfuse
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secrets-store
  target:
    # Independent MinIO root creds so the chart references them via
    # s3.auth.existingSecret instead of auto-creating (and pruning) the secret.
    name: langfuse-s3
    creationPolicy: Owner
  data:
    - secretKey: root-user
      remoteRef:
        key: langfuse/minio
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: langfuse/minio
        property: root-password

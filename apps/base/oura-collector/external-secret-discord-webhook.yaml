apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook-env
  namespace: oura-collector
spec:
  secretStoreRef:
    name: local-secret-store
    kind: SecretStore
  target:
    name: discord-webhook-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DISCORD_HEALTH_WEBHOOK_URL: "{{ .webhook_url }}"
  data:
  - secretKey: webhook_url
    remoteRef:
      key: oura-collector/discord-webhook
  refreshInterval: 1h

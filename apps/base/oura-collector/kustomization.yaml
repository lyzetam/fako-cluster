apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oura-collector
resources:
  - namespace.yaml
  - rbac.yaml
  - rbac-additions.yaml      # New: Additional RBAC for External Secrets
  - secret-store.yaml        # SecretStore for local K8s secret transformation
  - external-secret-aws.yaml # New: External Secret for AWS credentials
  - external-secret-postgres.yaml # New: External Secret for PostgreSQL credentials
  - external-secret-discord-webhook.yaml # Discord webhook for health reports
  - external-secret-obsidian.yaml # Obsidian Local REST API for vault copies
  - configmap.yaml
  - storage.yaml
  - deployment.yaml
  - service.yaml
  # ingress.yaml removed 2026-06-30: dead config — host had no DNS, routed to a
  # non-existent service port (8000; svc exposes 8080), no cloudflared tunnel
  # route, only fronted the health endpoint. Left an LE HTTP-01 challenge stuck
  # 350d. Collector is an outbound pipeline; needs no ingress.
  # - backfill-job.yaml  # Removed: Should only be run manually when needed
  - cronjob.yaml         # Added: Use CronJob for scheduled backfills instead

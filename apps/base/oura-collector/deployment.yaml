apiVersion: apps/v1
kind: Deployment
metadata:
  name: oura-collector
  namespace: oura-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oura-collector
  template:
    metadata:
      labels:
        app: oura-collector
    spec:
      serviceAccountName: oura-collector
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: oura-collector
        image: lzetam/oura-collector:latest
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        envFrom:
        - configMapRef:
            name: oura-collector-config
        # aws-credentials-env removed (H3): the app reads Oura + DB creds from env
        # (delivered by the external-secrets controller); it no longer calls AWS.
        - secretRef:
            name: oura-api-env
        - secretRef:
            name: postgres-credentials-env
        - secretRef:
            name: discord-webhook-env
        - secretRef:
            name: obsidian-api-env
        - secretRef:
            name: dr-agent-token-env
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: oura-collector-data
      - name: tmp
        emptyDir: {}

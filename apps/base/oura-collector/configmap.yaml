apiVersion: v1
kind: ConfigMap
metadata:
  name: oura-collector-config
  namespace: oura-collector
data:
  # Storage configuration
  STORAGE_BACKEND: "postgres"
  DATABASE_HOST: "postgres-cluster-rw.postgres.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "oura"
  
  # AWS Secrets Manager configuration
  AWS_DEFAULT_REGION: "us-east-1"
  OURA_SECRETS_NAME: "oura/api-credentials"
  POSTGRES_SECRETS_NAME: "postgres/app-user"
  
  # Collection configuration
  COLLECTION_INTERVAL: "3600"  # 1 hour
  DAYS_TO_BACKFILL: "30"  # Increased from 7 to 30 days
  RUN_ONCE: "false"
  
  # Logging
  LOG_LEVEL: "INFO"

  # Stale Data Detection
  STALE_DATA_THRESHOLD_DAYS: "3"
  ALERT_ON_STALE_DATA: "false"

  # API Configuration
  API_TIMEOUT: "30"
  MAX_RETRIES: "3"
  RETRY_DELAY: "5"

  # Obsidian vault copy (URL + key come from the obsidian-api-env secret)
  OBSIDIAN_VERIFY_TLS: "false"          # self-signed cert on the Local REST API
  OBSIDIAN_VAULT_FOLDER: "Health/Oura Daily"

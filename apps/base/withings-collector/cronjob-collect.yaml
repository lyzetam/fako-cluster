# Withings pull job — refresh the (rotating) OAuth token, fetch measuregroups
# since the last stored measurement, upsert into Postgres `withings.withings_measures`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: withings-collect
  namespace: withings-collector
spec:
  schedule: "0 */6 * * *"       # every 6 hours (matches oura's cadence)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: withings-collector
          imagePullSecrets:
            - name: dockerhub-pull
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
          - name: withings-collect
            image: lzetam/withings-collector:latest
            imagePullPolicy: Always
            command: ["python", "collector.py"]
            envFrom:
            - configMapRef:
                name: withings-collector-config
            - secretRef:
                name: postgres-credentials-env
            - secretRef:
                name: withings-oauth-env
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "300m"

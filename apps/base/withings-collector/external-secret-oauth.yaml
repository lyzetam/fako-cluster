# Withings OAuth2 app credentials (client_id / client_secret / redirect_uri).
# Stored in AWS SM at withings/oauth-app (created during the developer-account
# setup). The rotating access/refresh *tokens* are NOT here — those live in the
# Postgres `withings_tokens` row and rotate on every refresh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: withings-oauth-env
  namespace: withings-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: withings-oauth-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        WITHINGS_CLIENT_ID: "{{ .client_id }}"
        WITHINGS_CLIENT_SECRET: "{{ .client_secret }}"
        WITHINGS_REDIRECT_URI: "{{ .callback_url }}"
  data:
  - secretKey: client_id
    remoteRef:
      key: withings/oauth-app
      property: client_id
  - secretKey: client_secret
    remoteRef:
      key: withings/oauth-app
      property: client_secret
  - secretKey: callback_url
    remoteRef:
      key: withings/oauth-app
      property: callback_url
  refreshInterval: 1h

apiVersion: apps/v1
kind: Deployment
metadata:
  name: withings-collector
  namespace: withings-collector
spec:
  replicas: 1
  strategy:
    type: RollingUpdate       # maxSurge 0 → old pod deleted before new one, releasing the RWO PVC
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: withings-collector
  template:
    metadata:
      labels:
        app: withings-collector
    spec:
      serviceAccountName: withings-collector
      imagePullSecrets:
        - name: dockerhub-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      # OAuth2 /authorize + /callback bootstrap and health server.
      - name: withings-collector
        image: lzetam/withings-collector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: withings-collector-config
        - secretRef:
            name: postgres-credentials-env
        - secretRef:
            name: withings-oauth-env
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

      # Tailscale sidecar — serves /authorize + /callback privately over HTTPS.
      - name: tailscale
        image: tailscale/tailscale:v1.80.0
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-authkey
              key: TS_AUTHKEY
        - name: TS_HOSTNAME
          value: "withings-collector"
        - name: TS_EXTRA_ARGS
          value: "--advertise-tags=tag:k8s"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_KUBE_SECRET
          value: ""                                 # no k8s API (unreachable in userspace mode)
        - name: TS_STATE_DIR
          value: "/tmp/tsstate"                     # persistent dir state on a PVC → stable name
        - name: TS_SOCKET
          value: "/tmp/tsstate/tailscaled.sock"
        - name: TS_SERVE_CONFIG
          value: "/etc/tailscale/serve.json"
        volumeMounts:
        - name: serve
          mountPath: /etc/tailscale
        - name: tsstate
          mountPath: /tmp/tsstate
        resources:
          requests:
            memory: "64Mi"
            cpu: "20m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: serve
        configMap:
          name: tailscale-serve
      - name: tsstate
        persistentVolumeClaim:
          claimName: withings-tailscale-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: withings-tailscale-state
  namespace: withings-collector
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: nfs-csi-v2
  resources:
    requests:
      storage: 64Mi

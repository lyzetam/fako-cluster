apiVersion: v1
kind: ConfigMap
metadata:
  name: withings-collector-config
  namespace: withings-collector
data:
  DATABASE_HOST: "postgres-cluster-rw.postgres.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "withings"

  # First-run / overlap window for the pull job.
  DAYS_TO_BACKFILL: "7"
  LOG_LEVEL: "INFO"

  # Daily report → Obsidian vault (parallel to oura's "Health/Oura Daily" and
  # hume's "Health/Hume Daily").
  OBSIDIAN_VAULT_FOLDER: "Health/Withings Daily"
  OBSIDIAN_VERIFY_TLS: "false"   # self-signed cert on the Local REST API

# AWS Secrets Manager store — auths via the in-namespace `aws-credentials`
# bootstrap secret (mirrors hume/oura-collector). Reads postgres/obsidian/
# withings/dockerhub/tailscale secrets.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: withings-collector
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
---
# Local Kubernetes store — transforms the bootstrap `aws-credentials` into env vars.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: local-secret-store
  namespace: withings-collector
spec:
  provider:
    kubernetes:
      remoteNamespace: withings-collector
      auth:
        serviceAccount:
          name: withings-collector
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt

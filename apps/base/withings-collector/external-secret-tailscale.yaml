# Tailscale auth key (tagged tag:k8s) for the proxy sidecar. From AWS SM.
# NOTE: create tailscale/withings-authkey in AWS SM before activating (a reusable,
# non-ephemeral key so the device name stays stable — see DEPLOY.md).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-authkey
  namespace: withings-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: tailscale-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        TS_AUTHKEY: "{{ .authkey }}"
  data:
  - secretKey: authkey
    remoteRef:
      key: tailscale/withings-authkey
  refreshInterval: 1h

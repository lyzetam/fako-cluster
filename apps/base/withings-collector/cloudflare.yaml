# Public HTTPS via Cloudflare Tunnel — exposes the collector's /webhook so Withings
# can POST appli-58 (glucose) data-update notifications. Tunnel `withings-webhook`,
# credentials in the SOPS `tunnel-credentials` secret (apps/staging overlay).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: withings-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2025.11.1
        args: ["tunnel", "--config", "/etc/cloudflared/config/config.yaml", "run"]
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits: { memory: "256Mi", cpu: "300m" }
        livenessProbe:
          httpGet: { path: /ready, port: 2000 }
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - { name: config, mountPath: /etc/cloudflared/config, readOnly: true }
        - { name: creds, mountPath: /etc/cloudflared/creds, readOnly: true }
      volumes:
      - name: creds
        secret:
          secretName: tunnel-credentials
      - name: config
        configMap:
          name: cloudflared
          items:
          - { key: config.yaml, path: config.yaml }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: withings-collector
data:
  config.yaml: |
    tunnel: withings-webhook
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
    - hostname: withings-webhook.landryzetam.net
      service: http://withings-collector:8080
    - service: http_status:404

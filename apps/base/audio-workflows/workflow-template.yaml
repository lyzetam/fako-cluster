apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: audio-processing-pipeline
  namespace: audio-workflows
spec:
  serviceAccountName: audio-workflow-runner
  entrypoint: audio-pipeline
  ttlStrategy:
    secondsAfterCompletion: 86400  # 24h retention

  activeDeadlineSeconds: 172800  # 48 hour max runtime (large files need time for splitting + transcription)

  imagePullSecrets:
  - name: dockerhub-registry

  # Shared storage via NFS CSI PVCs
  volumes:
  - name: audio-raw
    persistentVolumeClaim:
      claimName: audio-raw
  - name: transcriptions
    persistentVolumeClaim:
      claimName: transcriptions
  - name: publisher-script
    configMap:
      name: transcript-publisher-script
  - name: summarizer-script
    configMap:
      name: transcript-summarizer-script
  - name: diary-script
    configMap:
      name: daily-diary-script

  templates:
  # Main DAG orchestrating the pipeline
  - name: audio-pipeline
    dag:
      tasks:
      - name: download
        template: sftp-downloader

      - name: transcribe
        template: audio-transcriber
        dependencies: [download]

      # Fan-out: these 3 run in parallel after transcription
      - name: publish
        template: transcript-publisher
        dependencies: [transcribe]

      - name: summarize
        template: transcript-summarizer
        dependencies: [transcribe]

      - name: diary
        template: daily-diary
        dependencies: [transcribe]

  # Step 1: SFTP Download (fetch raw .m4a files)
  - name: sftp-downloader
    retryStrategy:
      limit: 3
      backoff:
        duration: "1m"
        factor: 2
        maxDuration: "10m"
    container:
      image: python:3.11-slim
      command:
      - python
      - -u
      - -c
      - |
        import json, os, sys, subprocess
        subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "paramiko"])
        import paramiko

        host = os.environ["SFTP_HOST"]
        port = int(os.environ["SFTP_PORT"])
        user = os.environ["SFTP_USERNAME"]
        password = os.environ["SFTP_PASSWORD"]
        remote_path = os.environ["SFTP_REMOTE_PATH"]
        output_dir = os.environ["OUTPUT_DIR"]
        os.makedirs(output_dir, exist_ok=True)

        # Load manifest of already-downloaded files
        manifest_path = os.path.join(output_dir, "manifest.json")
        downloaded = set()
        if os.path.exists(manifest_path):
            with open(manifest_path) as f:
                manifest = json.load(f)
                downloaded = set(manifest.get("files", []))

        # Also check what's already on disk
        existing = {f for f in os.listdir(output_dir) if f.endswith(".m4a")}

        transport = paramiko.Transport((host, port))
        transport.connect(username=user, password=password)
        sftp = paramiko.SFTPClient.from_transport(transport)

        files = [f for f in sftp.listdir(remote_path) if f.endswith(".m4a") and not f.startswith("._")]
        print(f"Found {len(files)} .m4a files on SFTP")

        new_count = 0
        for fname in sorted(files):
            if fname in downloaded or fname in existing:
                continue
            remote_file = f"{remote_path}/{fname}"
            local_file = os.path.join(output_dir, fname)
            size_mb = sftp.stat(remote_file).st_size / (1024 * 1024)
            print(f"Downloading {fname} ({size_mb:.1f} MB)...")
            sftp.get(remote_file, local_file)
            downloaded.add(fname)
            existing.add(fname)
            new_count += 1

        sftp.close()
        transport.close()

        # Save manifest
        with open(manifest_path, "w") as f:
            json.dump({"files": sorted(downloaded | existing), "last_run": __import__("datetime").datetime.utcnow().isoformat() + "Z", "total_files": len(downloaded | existing)}, f, indent=2)

        print(f"Done: {new_count} new files downloaded, {len(files) - new_count} skipped")
      env:
      - name: SFTP_HOST
        value: "sftp-server.sftp-server.svc.cluster.local"
      - name: SFTP_PORT
        value: "22"
      - name: SFTP_REMOTE_PATH
        value: "audio/Voice Recordings"
      - name: SFTP_USERNAME
        valueFrom:
          secretKeyRef:
            name: sftp-credentials
            key: username
      - name: SFTP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: sftp-credentials
            key: password
      - name: OUTPUT_DIR
        value: "/data"
      volumeMounts:
      - name: audio-raw
        mountPath: /data
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"

  # Step 2: Audio Transcription (Whisper)
  - name: audio-transcriber
    retryStrategy:
      limit: 3
      backoff:
        duration: "2m"
        factor: 2
        maxDuration: "45m"
    container:
      image: lzetam/audio-transcriber:latest
      imagePullPolicy: Always
      command: ["python", "-m", "src.main"]
      envFrom:
      - configMapRef:
          name: audio-transcriber-config
      env:
      - name: WHISPER_API_TYPE
        value: "whisperx"
      - name: WHISPER_BASE_URL
        value: "http://whisperx-api.whisperx.svc.cluster.local:8000"
      - name: WHISPER_API_KEY
        value: "not-required"
      - name: WHISPERX_ALIGN
        value: "true"
      - name: WHISPERX_DIARIZE
        value: "true"
      - name: WHISPERX_MIN_SPEAKERS
        value: "2"
      volumeMounts:
      - name: audio-raw
        mountPath: /data/audio
        readOnly: true
      - name: transcriptions
        mountPath: /data/transcriptions
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "1Gi"
          cpu: "500m"

  # Step 3a: Transcript Publisher (parallel)
  - name: transcript-publisher
    retryStrategy:
      limit: 3
      backoff:
        duration: "30s"
        factor: 2
    container:
      image: python:3.11-slim
      command: ["python", "/scripts/publisher.py"]
      envFrom:
      - configMapRef:
          name: transcript-publisher-config
      env:
      - name: OBSIDIAN_API_URL
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_url
      - name: OBSIDIAN_API_KEY
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_key
      - name: USE_TIMESTAMP_FILTER
        value: "false"  # Rely on SKIP_PROCESSED for idempotency
      volumeMounts:
      - name: publisher-script
        mountPath: /scripts
      - name: transcriptions
        mountPath: /data/transcriptions
        readOnly: true
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"

  # Step 3b: Transcript Summarizer (parallel)
  - name: transcript-summarizer
    retryStrategy:
      limit: 3
      backoff:
        duration: "30s"
        factor: 2
    container:
      image: python:3.11-slim
      command: ["python", "/scripts/summarizer.py"]
      envFrom:
      - configMapRef:
          name: transcript-summarizer-config
      env:
      - name: OBSIDIAN_API_URL
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_url
      - name: OBSIDIAN_API_KEY
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_key
      - name: SUMMARIZER_BASE_URL
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_base_url
      - name: SUMMARIZER_API_KEY
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_api_key
      - name: SUMMARIZER_MODEL
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_model
      - name: USE_TIMESTAMP_FILTER
        value: "true"
      - name: WORKFLOW_START_TIME
        value: "{{workflow.creationTimestamp}}"
      volumeMounts:
      - name: summarizer-script
        mountPath: /scripts
      - name: transcriptions
        mountPath: /data/transcriptions
        readOnly: true
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "1Gi"
          cpu: "500m"

  # Step 3c: Daily Diary (parallel)
  - name: daily-diary
    retryStrategy:
      limit: 3
      backoff:
        duration: "30s"
        factor: 2
    container:
      image: python:3.11-slim
      command: ["python", "/scripts/daily-diary.py"]
      envFrom:
      - configMapRef:
          name: daily-diary-config
      env:
      - name: OBSIDIAN_API_URL
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_url
      - name: OBSIDIAN_API_KEY
        valueFrom:
          secretKeyRef:
            name: obsidian-api
            key: api_key
      - name: SUMMARIZER_BASE_URL
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_base_url
      - name: SUMMARIZER_API_KEY
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_api_key
      - name: SUMMARIZER_MODEL
        valueFrom:
          secretKeyRef:
            name: summarizer-credentials
            key: summarizer_model
      - name: DIARY_PROMPT
        valueFrom:
          secretKeyRef:
            name: diary-prompt
            key: DIARY_PROMPT
      - name: USE_TIMESTAMP_FILTER
        value: "true"
      - name: WORKFLOW_START_TIME
        value: "{{workflow.creationTimestamp}}"
      volumeMounts:
      - name: diary-script
        mountPath: /scripts
      - name: transcriptions
        mountPath: /data/transcriptions
        readOnly: true
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "200m"

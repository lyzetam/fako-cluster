# Pull secret for the private lzetam/hume-collector image (kept private).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-pull
  namespace: hume-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: dockerhub-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub/credentials
        property: token
  refreshInterval: 1h

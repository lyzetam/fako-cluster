# The shared token the iOS app sends as X-Auth-Token. Stored in AWS SM at
# hume/ingest-token (a plain string secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hume-ingest-token
  namespace: hume-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: hume-ingest-token-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        HUME_INGEST_TOKEN: "{{ .token }}"
  data:
  - secretKey: token
    remoteRef:
      key: hume/ingest-token
  refreshInterval: 1h

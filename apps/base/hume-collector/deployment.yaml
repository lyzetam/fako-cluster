apiVersion: apps/v1
kind: Deployment
metadata:
  name: hume-collector
  namespace: hume-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hume-collector
  template:
    metadata:
      labels:
        app: hume-collector
    spec:
      serviceAccountName: hume-collector
      imagePullSecrets:
        - name: dockerhub-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: hume-collector
        image: lzetam/hume-collector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: hume-collector-config
        - secretRef:
            name: postgres-credentials-env
        - secretRef:
            name: hume-ingest-token-env
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

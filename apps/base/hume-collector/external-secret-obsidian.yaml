apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: obsidian-api-env
  namespace: hume-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: obsidian-api-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        OBSIDIAN_API_URL: "{{ .api_url }}"
        OBSIDIAN_API_KEY: "{{ .api_key }}"
  data:
  - secretKey: api_url
    remoteRef:
      key: obsidian/api
      property: api_url
  - secretKey: api_key
    remoteRef:
      key: obsidian/api
      property: api_key
  refreshInterval: 1h

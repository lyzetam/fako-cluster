apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hume-collector
resources:
  - namespace.yaml
  - rbac.yaml
  - secret-store.yaml
  - external-secret-postgres.yaml
  - external-secret-ingest-token.yaml
  - external-secret-obsidian.yaml
  - external-secret-dockerhub.yaml
  - external-secret-tailscale.yaml
  - tailscale-proxy.yaml
  # networkpolicy.yaml removed: too restrictive for Tailscale's NAT-traversal
  # egress (UDP/DERP). The receiver's auth is the token/tailnet, not egress filtering.
  - networkpolicy.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - cronjob-report.yaml

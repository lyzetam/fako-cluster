# Daily Hume report → Obsidian vault "Health/Hume Daily/<date>.md".
# Parallel to oura-collector's daily vault report.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hume-report
  namespace: hume-collector
spec:
  schedule: "30 5 * * *"        # 05:30 daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: hume-collector
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
          - name: hume-report
            image: lzetam/hume-collector:latest
            imagePullPolicy: Always
            command: ["python", "report.py"]
            envFrom:
            - configMapRef:
                name: hume-collector-config
            - secretRef:
                name: postgres-credentials-env
            - secretRef:
                name: obsidian-api-env
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "256Mi"
                cpu: "300m"

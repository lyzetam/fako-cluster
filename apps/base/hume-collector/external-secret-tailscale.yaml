# Tailscale auth key (tagged tag:k8s) for the proxy sidecar. From AWS SM.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-authkey
  namespace: hume-collector
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: tailscale-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        TS_AUTHKEY: "{{ .authkey }}"
  data:
  - secretKey: authkey
    remoteRef:
      key: tailscale/hume-authkey
  refreshInterval: 1h

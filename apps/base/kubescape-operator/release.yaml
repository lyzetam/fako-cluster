apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape-operator
  namespace: kubescape
spec:
  interval: 30m
  # node-agent DaemonSet rolls one pod at a time and pulls a new image across 5
  # heterogeneous nodes (incl. slow 8GB pgmac01); Helm's default 5m wait times
  # out on image-tag bumps and stalls the release. Give the rollout headroom.
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kubescape-operator
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: kubescape
        namespace: kubescape
  values:
    # Enable continuous scanning for real-time monitoring
    capabilities:
      continuousScan: enable
      networkPolicyService: enable
      # Expose vulnerability/compliance counts as Prometheus metrics (server-side
      # aggregation — avoids the storage API's spec-stripping on LIST queries that
      # makes ad-hoc `kubectl get -A` reads look like "0 CVEs"). Feeds Grafana +
      # alerting so the real posture is always visible. See kubescape-vuln-query-gotcha.
      prometheusExporter: enable
      
    # Configure storage for scan results
    storage:
      enabled: true
      storageClass: nfs-security-logs  # Use our dedicated security logs storage
      size: 20Gi
      
    # Configure persistent storage for vulnerability database
    vulnerabilityDB:
      persistence:
        enabled: true
        storageClass: nfs-security-logs
        size: 10Gi
        accessMode: ReadWriteOnce
        
    # Configure the Kubescape cloud component (optional - for cloud dashboard)
    kubescapeCloud:
      enabled: false  # Set to true if you have a Kubescape cloud account
      
    # Configure scanning intervals
    scanSchedule:
      frameworks:
        - name: "nsa"
          cronTabSchedule: "0 */6 * * *"  # Every 6 hours
        - name: "mitre"
          cronTabSchedule: "0 */6 * * *"
        - name: "cis-v1.23-t1.0.1"
          cronTabSchedule: "0 2 * * *"    # Daily at 2 AM
          
    # Network policy configuration
    networkPolicy:
      enabled: true
      scanInterval: 15m
      
    # Resource requests and limits
    operator:
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
          ephemeral-storage: "1Gi"
        limits:
          memory: "512Mi"
          cpu: "500m"
          ephemeral-storage: "2Gi"
          
    kubevuln:
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
          ephemeral-storage: "5Gi"
        limits:
          memory: "2Gi"
          cpu: "1"
          ephemeral-storage: "15Gi"  # Significantly increased to prevent eviction
          
    gateway:
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
          ephemeral-storage: "1Gi"
        limits:
          memory: "512Mi"
          cpu: "300m"
          ephemeral-storage: "2Gi"
          
    # Enable prometheus metrics
    prometheus:
      enabled: true
      
    # Node agent configuration
    nodeAgent:
      # Pin past chart baseline v0.3.119 (buggy): fixes inspektor-gadget pubsub
      # "concurrent map writes" data-race panic on high-churn nodes (e.g. aitower).
      # Upstream: kubescape/node-agent#825, fixed in #826 (>= v0.3.128).
      # Remove this override once the chart's default tag advances past the fix.
      image:
        tag: v0.3.147
      # Only deploy on x86_64 nodes (BTF support required, not available on ARM/Jetson)
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: amd64  # Only run on x86_64 nodes, exclude ARM64/Jetson
      # Additional node affinity rules
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64  # Ensure only x86_64 architecture
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - zz-macbookpro  # Exclude macOS node

# Per-namespace RoleBindings for the headlamp-admin ServiceAccount.
#
# These replace the original cluster-wide ClusterRoleBinding for write
# access. The admin token still has cluster-wide READ via the
# `headlamp-admin-read` ClusterRoleBinding in admin-serviceaccount.yaml,
# but write permissions are now confined to the app namespaces listed below.
#
# Excluded namespaces (no write binding):
#   - headlamp        (recursive — prevents admin from mutating its own pod/SA)
#   - keycloak        (identity infrastructure)
#   - postgres        (CNPG-managed database — data integrity)
#   - kubescape       (security scanner operator)
#   - kube-bench      (the kube-bench SA has cluster-wide secrets get/list;
#                      exec into its pod = read every cluster secret)
#   - quantum-trades  (orchestrator-qt SA has cluster-wide secrets read;
#                      same exfil path)
#   - zi              (k8s-operator SA has cluster-wide pods delete +
#                      deployment patch/scale; DoS / pod-restart abuse)
#   - housekeeping    (housekeeping SA has cluster-wide pods delete;
#                      DoS abuse)
#   - kube-system, kube-public, kube-node-lease, default, flux-system,
#     external-secrets, cert-manager, monitoring, gpu-operator,
#     cnpg-system, traefik, velero, argo*, mcp-servers (dormant)
#
# Rationale: a cluster-wide `pods` write + `pods/exec` is functionally
# cluster-admin (mount any Secret as a volume, run as any SA, hostPath,
# etc.). Namespace-scoping the writes closes this escalation by denying
# pod-scheduling in namespaces that host privileged SAs / operators /
# secrets stores. The audit re-review (2026-05-11) flagged this as the
# residual cluster-admin path after stripping the cluster-admin binding.
#
# Before adding a new namespace to this binding list, RUN:
#   grep -rEl "kind: ClusterRoleBinding" apps/base/<ns>/
# If the namespace hosts a ServiceAccount with cluster-scoped privileges,
# do NOT add a write binding here — those privileges become transitively
# available to the headlamp admin token via pod-SA-shadowing or pods/exec.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headlamp-admin
  namespace: ai-mastery-path
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp-admin
subjects:
- kind: ServiceAccount
  name: headlamp-admin
  namespace: kube-system

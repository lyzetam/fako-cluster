apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
---
# Write-only role for the headlamp-admin SA. Reads come from the `headlamp`
# ClusterRole (defined in rbac.yaml) via the additional ClusterRoleBinding
# below. That read scope explicitly EXCLUDES secrets, so the admin token
# pasted into the dashboard cannot enumerate secret values.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-admin
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
rules:
# Workload writes
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["create", "update", "patch", "delete", "deletecollection"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["create", "update", "patch", "delete", "deletecollection"]
# Core resource writes (no secrets, no serviceaccounts, no namespaces)
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "persistentvolumeclaims", "events"]
  verbs: ["create", "update", "patch", "delete", "deletecollection"]
# Exec/portforward (subresources — only "create" is valid)
- apiGroups: [""]
  resources: ["pods/exec", "pods/portforward"]
  verbs: ["create"]
# Networking writes
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["create", "update", "patch", "delete"]
# Autoscaling writes
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["create", "update", "patch", "delete"]
---
# Binding 1: grants reads via the `headlamp` ClusterRole (defined in rbac.yaml).
# This SA inherits the same secret-less read scope as the dashboard pod.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-read
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp
subjects:
- kind: ServiceAccount
  name: headlamp-admin
  namespace: kube-system
---
# Writes are bound per-namespace via RoleBindings in admin-rolebindings.yaml.
# Cluster-wide pods/exec + workload writes (the old pattern) is functionally
# cluster-admin via pod-SA-shadowing; namespace-scoping closes that path
# by denying admin writes in namespaces that host privileged SAs/operators.
---
# Long-lived token kept for backward compatibility with current UI login.
# After oauth2-proxy is fronting (Task 6), consider rotating + deleting this.
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: kube-system
  labels:
    app.kubernetes.io/name: headlamp-admin
    app.kubernetes.io/part-of: headlamp
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token

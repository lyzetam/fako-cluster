# Materializes a dockerhub-registry imagePullSecret from AWS Secrets Manager.
# Avoids Docker Hub anonymous pull rate-limit on this namespace's pulls
# (most relevant after node reboots / cold image caches).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-registry
  namespace: mcp-gateway
spec:
  secretStoreRef:
    name: aws-secrets-store    # NB: this namespace uses the plural "secrets" name
    kind: SecretStore
  target:
    name: dockerhub-registry
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub/credentials
        property: token
  refreshInterval: 1h

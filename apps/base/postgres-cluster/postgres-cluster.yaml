apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.14
  enableSuperuserAccess: true
  
  # Use AWS Secrets Manager for admin credentials
  superuserSecret:
    name: postgres-admin-secret
  
  primaryUpdateStrategy: unsupervised
  startDelay: 300
  stopDelay: 300
  
  # PostgreSQL configuration
  postgresql:
    shared_preload_libraries:
      - "pg_stat_statements"
    
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
      effective_cache_size: "3GB"
      work_mem: "8MB"
      wal_buffers: "16MB"
      maintenance_work_mem: "64MB"
      wal_level: "replica"
      max_wal_size: "1GB"
      min_wal_size: "80MB"
      checkpoint_timeout: "5min"
      checkpoint_completion_target: "0.9"
    
    pg_hba:
      - host all all 10.0.0.0/8 md5
      - host all all 172.16.0.0/12 md5
      - host all all 192.168.0.0/16 md5
  
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: app-user-secret  # This now comes from AWS via External Secrets
      dataChecksums: true
      encoding: "UTF8"
      localeCollate: "en_US.UTF-8"
      localeCType: "en_US.UTF-8"

  # Declaratively reconcile the `admin` login role's password from app-user-secret.
  # Without this, `admin` was only synced by a one-shot init Job, so the role's
  # DB password silently drifted from the (AWS-sourced) secret on rotation/restore
  # and broke app auth (e.g. oura-collector: "password authentication failed for
  # user admin"). CNPG now re-applies it every reconcile. Attributes mirror the
  # role's existing state so this changes nothing but password reconciliation.
  managed:
    roles:
      - name: admin
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
        connectionLimit: -1
        passwordSecret:
          name: app-user-secret
  
  storage:
    size: 50Gi
    storageClass: "nfs-postgres-v2"
  
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
  
  # Backup configuration via CronJob (see backup-schedule.yaml)
  # Using NFS-based backups instead of cloud object storage
  
  # Monitoring configuration 
  # monitoring:
  #   # enabled: true
  #   customQueriesConfigMap:
  #     - name: postgres-monitoring
  #       key: custom-queries

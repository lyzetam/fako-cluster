# Generates the risk/reward board on a schedule and writes it to the shared PVC.
# Deterministic: pulls Sportmonks predictions + Kalshi odds, no LLM on the WC path.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sports-bets-generate
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets
    app.kubernetes.io/component: generator
    app.kubernetes.io/part-of: sports-bets
    app.kubernetes.io/managed-by: flux
spec:
  # Morning slate + a pre-kickoff catch-up (confirmed XIs). UTC.
  suspend: true
  schedule: "0 */2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sports-bets
            app.kubernetes.io/component: generator
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: generate
              # v1 generator now ships from its own repo/image (sports-bets-v1); the
              # `sports-bets` CLI moved out of lzetam/sports-bets (which is now v2-only).
              image: lzetam/sports-bets-v1:latest
              imagePullPolicy: Always
              args: ["run", "--tournament", "world-cup", "--stake", "5", "--out-dir", "/data"]
              envFrom:
                - secretRef:
                    name: sports-bets-secrets   # SPORTMONKS_API_KEY + URL + KALSHI creds
              env:
                # Auto-open ARMED: real Kalshi orders, capped at $2/slip and $35/day.
                # Max-edge selection can favor longshots; we accept the variance within
                # the cap and let the live results feed the eventual calibration check.
                # Disarmed: v1 keeps generating the board + recording its picks (the
                # v1-vs-v2 scoreboard baseline) but no longer PLACES bets — only v2 bets
                # on the shared Kalshi account. Flip back to "true" to re-arm v1.
                - name: SPORTSBETS_KALSHI_AUTO_OPEN
                  value: "false"
                - name: SPORTSBETS_KALSHI_DAILY_BUDGET
                  value: "35"
                - name: SPORTSBETS_KALSHI_MAX_STAKE_PER_SLIP
                  value: "2"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: sports-bets-data
            - name: tmp
              emptyDir: {}

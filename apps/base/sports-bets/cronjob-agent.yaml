# v2 — autonomous AI betting agent (deepagents + Ollama Cloud glm-5.2).
# Same image as v1, different command. Reasons over Sportmonks signals, bets on Kalshi
# through the governance-bounded money path ($2/slip, $35/day enforced by Supabase
# agent-governance). Runs PARALLEL to the deterministic v1 for comparison. Memory lives
# in Supabase, so no PVC.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sports-bets-agent
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/part-of: sports-bets
    app.kubernetes.io/managed-by: flux
spec:
  # LIVE (2026-06-30). Shipped: StateGraph + atomic one-pick-per-game claim, deterministic
  # match model as a tool (MAD-trimmed + self-consistent baseline, core v0.1.2), which-line-to-bet
  # Kelly skill, cheap-tail untradeable rule. Capped verifies confirmed: grounded singles, no
  # Over-5.5 longshots, money-safety holds (clamp $2/slip + $35/day budget + idempotency).
  suspend: false
  schedule: "0 */2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 2700   # LLM reasoning over the slate (Ollama Cloud can be slow; a good run is ~19min, 30min was tripping DeadlineExceeded)
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sports-bets
            app.kubernetes.io/component: ai-agent
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: agent
              image: lzetam/sports-bets:latest
              imagePullPolicy: Always
              command: ["sports-bets-agent"]
              envFrom:
                - secretRef:
                    name: sports-bets-secrets   # Sportmonks + Kalshi + Ollama + Supabase(gov)
              env:
                - name: GOV_MAX_STAKE_CENTS      # per-slip clamp ($2) — unbypassable
                  value: "200"
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}

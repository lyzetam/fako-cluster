apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sports-bets-secrets
  namespace: sports-bets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: sports-bets-secrets
    creationPolicy: Owner
  data:
    # config.py reads SPORTMONKS_API_KEY/SPORTMONKS_API_URL from env (ExternalSecret),
    # so the pod needs no AWS credentials of its own.
    - secretKey: SPORTMONKS_API_KEY
      remoteRef:
        key: sportmonks/api
        property: api_key
    - secretKey: SPORTMONKS_API_URL
      remoteRef:
        key: sportmonks/api
        property: api_url
    # Kalshi (read+write) for real combo/parlay pricing. config.py reads
    # KALSHI_API_KEY_ID/KALSHI_PRIVATE_KEY from env; absent → margin-free estimate.
    - secretKey: KALSHI_API_KEY_ID
      remoteRef:
        key: kalshi/api
        property: api_key_id
    - secretKey: KALSHI_PRIVATE_KEY
      remoteRef:
        key: kalshi/api
        property: private_key
    # v2 AI agent: Ollama Cloud brain (glm-5.2) + Supabase agent-governance backend
    # (memory + budget + audit). config reads these from env.
    - secretKey: OLLAMA_API_KEY
      remoteRef:
        key: soccer-banter/ollama
        property: api_key
    - secretKey: SUPABASE_URL
      remoteRef:
        key: sports-bets/supabase
        property: url
    - secretKey: SUPABASE_SERVICE_KEY
      remoteRef:
        key: sports-bets/supabase
        property: service_role_key
    - secretKey: GOV_AGENT_ID
      remoteRef:
        key: sports-bets/supabase
        property: agent_id
    - secretKey: GOV_BUDGET_CATEGORY
      remoteRef:
        key: sports-bets/supabase
        property: budget_category

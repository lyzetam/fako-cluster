# Renders the v1-vs-v2 head-to-head scoreboard to the shared PVC (served by nginx at
# /scoreboard.html). Reads betting_recs (Supabase) + Kalshi settlements. Hourly, offset
# from the v1/v2 betting runs so it doesn't contend on the RWO PVC.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sports-bets-scoreboard
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets
    app.kubernetes.io/component: scoreboard
    app.kubernetes.io/part-of: sports-bets
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "30 */2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sports-bets
            app.kubernetes.io/component: scoreboard
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: scoreboard
              image: lzetam/sports-bets:latest
              imagePullPolicy: Always
              command: ["sports-bets-scoreboard"]
              args: ["--out", "/data/scoreboard.html"]
              envFrom:
                - secretRef:
                    name: sports-bets-secrets   # Kalshi (outcomes) + Supabase (betting_recs)
              env:
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: sports-bets-data
            - name: tmp
              emptyDir: {}

# Renders OUR deterministic model's per-game predictions (Result / BTTS / Over 2.5 + expected
# goals + edges vs the live Kalshi asks) to the shared PVC, served by nginx at /predictions.html.
# Pure read: Sportmonks form + standings -> scoring.match_model -> Poisson; no bets. Every 2h,
# offset from the v1/v2 runs and the scoreboard so it doesn't contend on the RWO PVC.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sports-bets-predictions
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets
    app.kubernetes.io/component: predictions
    app.kubernetes.io/part-of: sports-bets
    app.kubernetes.io/managed-by: flux
spec:
  suspend: true
  schedule: "15 */2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600   # per-team Sportmonks form fetches across the slate can be slow
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sports-bets
            app.kubernetes.io/component: predictions
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          imagePullSecrets:
            - name: dockerhub-registry
          containers:
            - name: predictions
              image: lzetam/sports-bets:latest
              imagePullPolicy: Always
              command: ["sports-bets-predictions"]
              args: ["--out", "/data/predictions.html"]
              envFrom:
                - secretRef:
                    name: sports-bets-secrets   # Sportmonks (form/standings/fixtures) + Kalshi (asks)
              env:
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: sports-bets-data
            - name: tmp
              emptyDir: {}

# Tiny nginx pod serving the generated board (index.html) from the shared PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-bets-web
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sports-bets
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC: one pod at a time
  selector:
    matchLabels:
      app.kubernetes.io/name: sports-bets-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sports-bets-web
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101            # nginx unprivileged image runs as uid 101
        fsGroup: 101
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: cache
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sports-bets-data
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sports-bets-web
  namespace: sports-bets
  labels:
    app.kubernetes.io/name: sports-bets-web
spec:
  selector:
    app.kubernetes.io/name: sports-bets-web
  ports:
    - name: http
      port: 80
      targetPort: http

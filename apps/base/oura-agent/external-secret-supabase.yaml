apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: supabase-credentials
  namespace: oura-agent
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: supabase-credentials-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        SUPABASE_URL: "{{ .url }}"
        SUPABASE_KEY: "{{ .anon_key }}"
  data:
  - secretKey: url
    remoteRef:
      key: oura-agent/supabase
      property: url
  - secretKey: anon_key
    remoteRef:
      key: oura-agent/supabase
      property: anon_key
  refreshInterval: 1h

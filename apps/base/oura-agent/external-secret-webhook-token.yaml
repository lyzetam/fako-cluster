apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webhook-token-env
  namespace: oura-agent
spec:
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: webhook-token-env
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        WEBHOOK_AUTH_TOKEN: "{{ .token }}"
  data:
  - secretKey: token
    remoteRef:
      key: oura-agent/webhook-token
      property: token
  refreshInterval: 1h

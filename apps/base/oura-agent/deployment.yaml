apiVersion: apps/v1
kind: Deployment
metadata:
  name: oura-agent
  namespace: oura-agent
  labels:
    app: oura-agent
spec:
  replicas: 1  # Single replica for Discord polling
  selector:
    matchLabels:
      app: oura-agent
  template:
    metadata:
      labels:
        app: oura-agent
    spec:
      serviceAccountName: oura-agent
      imagePullSecrets:
      - name: dockerhub-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: oura-agent
        image: lzetam/oura-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        envFrom:
        - configMapRef:
            name: oura-agent-config
        # aws-credentials-env removed (H3): the app reads all secrets from env
        # (delivered by the external-secrets controller); it no longer calls AWS.
        - secretRef:
            name: postgres-credentials-env
        - secretRef:
            name: discord-credentials-env
        - secretRef:
            name: anthropic-credentials-env
        - secretRef:
            name: supabase-credentials-env
        - secretRef:
            name: webhook-token-env

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault

        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

apiVersion: v1
kind: ConfigMap
metadata:
  name: oura-agent-config
  namespace: oura-agent
data:
  # Database configuration
  DATABASE_HOST: "postgres-cluster-rw.postgres.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "oura"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "10"

  # Discord configuration
  POLL_INTERVAL: "30"  # seconds between Discord polls
  MESSAGE_WINDOW_MINUTES: "30"  # only process messages from last N minutes

  # LLM configuration
  # LLM_PROVIDER: "anthropic" (Claude) or "ollama" (local homelab models).
  # Flip to "ollama" to keep all health-data inference on the ms nodes.
  LLM_PROVIDER: "anthropic"
  LLM_MODEL: "claude-sonnet-4-5-20250929"      # used when provider=anthropic
  OLLAMA_CHAT_MODEL: "glm-4.7-flash:latest"    # used when provider=ollama (on ms1/ms2/ms3)
  OLLAMA_CHAT_BASE_URLS: "http://ms1.landryzetam.net:11434,http://ms2.landryzetam.net:11434,http://ms3.landryzetam.net:11434"
  LLM_TEMPERATURE: "0.3"
  LLM_MAX_TOKENS: "4096"

  # Ollama embedding service (nomic-embed-text lives on ms3)
  OLLAMA_BASE_URL: "http://ms3.landryzetam.net:11434"
  OLLAMA_MODEL: "nomic-embed-text"
  OLLAMA_EMBEDDING_DIM: "768"

  # AWS configuration
  AWS_DEFAULT_REGION: "us-east-1"

  # Logging
  LOG_LEVEL: "INFO"

  # Run mode
  RUN_ONCE: "false"

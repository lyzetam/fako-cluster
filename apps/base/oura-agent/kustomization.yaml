apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oura-agent

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - external-secret-postgres.yaml
  - external-secret-discord.yaml
  - external-secret-anthropic.yaml
  - external-secret-dockerhub.yaml
  - external-secret-supabase.yaml
  - external-secret-webhook-token.yaml  # bearer token for /daily-summary + /webhook/discord
  - networkpolicy.yaml                  # scoped egress
  - deployment.yaml
  - service.yaml

commonLabels:
  app: oura-agent

# RBAC configuration for Oura Health Agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oura-agent
  namespace: oura-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oura-agent
  namespace: oura-agent
rules:
# The agent reads config + secrets via envFrom, and its ExternalSecrets use the
# AWS store (external-secrets-user), not this SA — so it needs no K8s secret access.
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oura-agent
  namespace: oura-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oura-agent
subjects:
- kind: ServiceAccount
  name: oura-agent
  namespace: oura-agent

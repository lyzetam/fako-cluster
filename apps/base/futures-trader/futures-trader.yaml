# futures-trader — STAGED (see README.md; not referenced by any kustomization yet).
# Namespace + ExternalSecret + IB Gateway + service Deployment + NetworkPolicy.
apiVersion: v1
kind: Namespace
metadata:
  name: futures-trader
  labels:
    app.kubernetes.io/part-of: futures-trader
    app.kubernetes.io/managed-by: flux
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: futures-trader
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: futures-trader-secrets
  namespace: futures-trader
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: futures-trader-secrets
    creationPolicy: Owner
  dataFrom:
    # AWS SM JSON secret (keys: TWS_USERID, TWS_PASSWORD, FT_SUPABASE_URL,
    # FT_SUPABASE_KEY, FT_TRADING_MODE, FT_AGENTS_API_KEY). The FT_-prefixed keys
    # are what the app reads via FuturesSettings (env_prefix="FT_"); TWS_* feed
    # the IB Gateway container.
    - extract:
        key: quantum-trades/futures/ibkr-paper
---
# Declaratively renders the private-image pull secret from AWS SM
# dockerhub/credentials — no imperative Job or manual kubectl.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-registry
  namespace: futures-trader
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: dockerhub-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .token }}","auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub/credentials
        property: username
    - secretKey: token
      remoteRef:
        key: dockerhub/credentials
        property: token
---
# IB Gateway — separate Deployment by design (user decision in spec), never a sidecar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ib-gateway
  namespace: futures-trader
  labels:
    app: ib-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate  # IBKR allows ONE session per credential set
  selector:
    matchLabels:
      app: ib-gateway
  template:
    metadata:
      labels:
        app: ib-gateway
    spec:
      containers:
        - name: ib-gateway
          image: ghcr.io/gnzsnz/ib-gateway:stable
          env:
            - name: TRADING_MODE
              value: "paper"
            # READ_ONLY_API=no is REQUIRED: without it the Gateway pops an
            # "API client needs write access" dialog that stalls the startup
            # state sync and drops the client (verified 2026-07-16).
            - name: READ_ONLY_API
              value: "no"
            - name: TWS_USERID
              valueFrom:
                secretKeyRef:
                  name: futures-trader-secrets
                  key: TWS_USERID
            - name: TWS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: futures-trader-secrets
                  key: TWS_PASSWORD
          ports:
            # 4004 is the socat forwarder the gnzsnz image exposes for paper
            # (internal IB Gateway API binds 127.0.0.1:4002 only; external peers
            # must hit 4004). Live would be 4003. Verified 2026-07-16.
            - containerPort: 4004
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ib-gateway
  namespace: futures-trader
spec:
  selector:
    app: ib-gateway
  ports:
    - name: api-paper
      port: 4004
      targetPort: 4004
---
# The order port on the cluster network REQUIRES this policy (spec): only the
# futures-trader pod may reach the IB Gateway API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ib-gateway-only-from-futures-trader
  namespace: futures-trader
spec:
  podSelector:
    matchLabels:
      app: ib-gateway
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: futures-trader
      ports:
        - port: 4004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: futures-trader
  namespace: futures-trader
  labels:
    app: futures-trader
spec:
  replicas: 1
  strategy:
    type: Recreate  # single trading loop, no leader lock in v1
  selector:
    matchLabels:
      app: futures-trader
  template:
    metadata:
      labels:
        app: futures-trader
    spec:
      # Private DockerHub repo; the dockerhub-registry ExternalSecret above
      # renders this pull secret from AWS SM. (amd64-only image; all cluster
      # nodes are amd64.)
      imagePullSecrets:
        - name: dockerhub-registry
      containers:
        - name: futures-trader
          image: lzetam/quantum-trades-futures-trader:latest
          imagePullPolicy: Always
          # envFrom injects the FT_-prefixed keys the app reads (FuturesSettings
          # env_prefix="FT_"): FT_SUPABASE_URL, FT_SUPABASE_KEY,
          # FT_AGENTS_API_KEY, FT_TRADING_MODE. (TWS_*/username/password are also
          # present but ignored by the app.)
          envFrom:
            - secretRef:
                name: futures-trader-secrets
          env:
            # Reach the IB Gateway Service on its socat paper port (see the
            # Service above). The app's config default host IS "ib-gateway", but
            # the default port is 4002 — override to 4004 to match the forwarder.
            - name: FT_IB_GATEWAY_HOST
              value: "ib-gateway"
            - name: FT_IB_GATEWAY_PAPER_PORT
              value: "4004"
            # 24h operation: entries allowed all day (MGC trades ~23h/day). The
            # tick itself runs every minute regardless (exits/reconciliation are
            # always live); this window gates ENTRIES only.
            - name: FT_SESSION_START_ET
              value: "00:00"
            - name: FT_SESSION_END_ET
              value: "23:59"
            # Bracket sized to gold's real volatility. The default 10-tick stop
            # is smaller than MGC's ~18.5-tick average 1-min bar, so noise stops
            # it out constantly (live: 41% win rate, deeply net-negative). A
            # backtest sweep on real bars showed a 40-tick stop / 40-tick target
            # (1:1) is the most slippage-robust config (61% win rate, positive
            # through moderate slippage). Evidence, 2026-07-16. Re-tune as more
            # paper data + a multi-session backtest accumulate.
            - name: FT_STOP_TICKS
              value: "40"
            - name: FT_TARGET_TICKS
              value: "40"
            # Daily-loss cap raised from the $100 code default to $5000 so the
            # PAPER account trades continuously as a data feed (operator choice,
            # 2026-07-23) rather than halting entries for the rest of the ET day
            # after a drawdown. NOTE: the cap is NOT dormant — the broker-truth
            # reconcile.record_close path populates futures_trades, so
            # get_realized_daily_pnl() reads real losses and this gate is live.
            - name: FT_MAX_DAILY_LOSS_DOLLARS
              value: "5000"
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8000
          startupProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 4
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fieldy-webhook

resources:
  - namespace.yaml
  - aws-credentials-secret.yaml
  - secretstore.yaml
  - external-secret-obsidian.yaml
  - external-secret-dockerhub.yaml
  - external-secret-fieldy-api.yaml
  - external-secret-anthropic.yaml
  - external-secret-langfuse.yaml
  - networkpolicy.yaml
  - networkpolicy-enrich.yaml
  - cronjob-puller.yaml
  - cronjob-enrich.yaml
  # Uncomment + bump metadata.name + set BACKFILL_START/END in backfill-job.yaml
  # to trigger a one-off historical backfill via GitOps. Re-comment after it
  # completes (or leave it — the Job's ttlSecondsAfterFinished auto-cleans).
  # - backfill-job.yaml
  # Full one-time enrichment backlog sweep — one-off, NOT a standing resource.
  # DISABLED: it was left uncommented after backfill-005, and with
  # ttlSecondsAfterFinished the completed Job kept getting TTL-deleted and
  # re-created by Flux (a ~daily uncapped resurrection loop) — the source of the
  # 2026-07-07 token burn. The capped cron (--limit 200) handles the backlog.
  # To run a deliberate one-off: uncomment, bump metadata.name, push, then
  # RE-COMMENT after it completes.
  # - enrich-backfill-job.yaml

labels:
  - pairs:
      app.kubernetes.io/name: fieldy-webhook
      app.kubernetes.io/instance: production
      app.kubernetes.io/component: puller
      app.kubernetes.io/part-of: fieldy

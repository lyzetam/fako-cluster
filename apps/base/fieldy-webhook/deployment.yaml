apiVersion: apps/v1
kind: Deployment
metadata:
  name: fieldy-webhook
  namespace: fieldy-webhook
  labels:
    app: fieldy-webhook
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: fieldy-webhook
  template:
    metadata:
      labels:
        app: fieldy-webhook
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fieldy-webhook
          image: lzetam/fieldy-webhook:v0.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OBSIDIAN_API_URL
              valueFrom:
                secretKeyRef:
                  name: obsidian-api
                  key: api_url
            - name: OBSIDIAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: obsidian-api
                  key: api_key
            - name: OBSIDIAN_VAULT_FOLDER
              value: "fieldy/json-files"
            # Obsidian-rest in this cluster uses a self-signed cert. Egress is restricted
            # to the single private host via NetworkPolicy, so verify=false is acceptable.
            # When the upstream gets a valid cert, flip this to "true" and remove the comment.
            - name: OBSIDIAN_VERIFY_TLS
              value: "false"
            - name: WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fieldy-webhook-token
                  key: token
            - name: MAX_BODY_BYTES
              value: "1048576"  # 1 MiB; Compass payloads are <10 KiB.
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5

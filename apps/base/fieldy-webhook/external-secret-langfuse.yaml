apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fieldy-langfuse
  namespace: fieldy-webhook
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: fieldy-langfuse
    creationPolicy: Owner
  data:
    # Reuses the same Langfuse project keys the zi agents use (AWS SM langfuse/agent-keys).
    - secretKey: public_key
      remoteRef:
        key: langfuse/agent-keys
        property: public_key
    - secretKey: secret_key
      remoteRef:
        key: langfuse/agent-keys
        property: secret_key

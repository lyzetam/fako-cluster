# One-off FULL enrichment backlog sweep for Fieldy.
#
# Unlike the fieldy-enrich CronJob (which caps each run at --limit 200), this
# Job runs scripts/enrich.py with NO --limit, so it processes the entire
# historical backlog in one shot. The script is idempotent + resumable
# (LangGraph SQLite checkpointer on the shared fieldy-enrich-state PVC), so a
# crash/timeout can be re-run safely.
#
# How to run the deliberate one-time historical backlog clear (GitOps):
#   1. Uncomment this file in kustomization.yaml.
#   2. Bump `metadata.name` (e.g., fieldy-enrich-backfill-001 -> -002) so K8s
#      treats it as a new Job, not a duplicate.
#   3. git add + commit + push. Flux reconciles within ~10m (or run
#      `flux reconcile kustomization apps --with-source`).
#   4. Watch: `kubectl logs -f -n fieldy-webhook -l job-name=fieldy-enrich-backfill-<n>`
#   5. After it succeeds, re-comment this file in kustomization.yaml.
#      (ttlSecondsAfterFinished auto-cleans the completed Job either way.)
apiVersion: batch/v1
kind: Job
metadata:
  name: fieldy-enrich-backfill-005  # bump on each new run
  namespace: fieldy-webhook
  labels:
    app: fieldy-enrich
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 172800  # 48h cap so the full sweep finishes in one resilient run
  template:
    metadata:
      labels:
        app: fieldy-enrich
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: dockerhub-secret
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: enrich
          image: lzetam/fieldy-webhook:v0.13.0
          # No --limit: process the entire backlog. Idempotent + resumable.
          command:
            - python
            - /app/scripts/enrich.py
          env:
            - name: FIELDY_VAULT_MODE
              value: "obsidian-api"
            - name: OBSIDIAN_API_URL
              valueFrom:
                secretKeyRef:
                  name: obsidian-api
                  key: api_url
            - name: OBSIDIAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: obsidian-api
                  key: api_key
            - name: OBSIDIAN_VERIFY_TLS
              value: "false"
            - name: FIELDY_VAULT_REL_ROOT
              value: "fieldy"
            - name: FIELDY_STATE_DIR
              value: "/state"
            - name: FIELDY_ENRICH_BACKEND
              value: "ollama"
            - name: OLLAMA_BASE_URL
              value: "http://ms3.landryzetam.net:11434"
            - name: OLLAMA_MODEL
              value: "gpt-oss:20b"
            - name: FIELDY_ENRICH_CONCURRENCY
              value: "4"  # v0.13.0 bounds the whole enrich_one under the semaphore, so this is true end-to-end concurrency (reads no longer stampede)
            # ANTHROPIC_* intentionally removed: enrichment runs on the local
            # ms3 Ollama model. With no cloud key in-env, the deepagents
            # claude-sonnet-4-6 default fails loud instead of silently billing.
            # Langfuse token-usage tracing (reuses the zi project keys).
            - name: LANGFUSE_HOST
              value: "http://langfuse-web.langfuse.svc:3000"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: fieldy-langfuse
                  key: public_key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fieldy-langfuse
                  key: secret_key
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: state
              mountPath: /state
      volumes:
        - name: state
          # Reuses the enrich CronJob's PVC so the LangGraph checkpointer state
          # survives crashes and the sweep resumes where it left off.
          persistentVolumeClaim:
            claimName: fieldy-enrich-state

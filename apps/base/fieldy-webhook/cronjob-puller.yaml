apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fieldy-puller-state
  namespace: fieldy-webhook
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 64Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fieldy-puller
  namespace: fieldy-webhook
  labels:
    app: fieldy-puller
spec:
  # Daily at 03:00 UTC. Pulls the previous 24h delta (conversations + new tasks +
  # transcripts) from Fieldy and persists to the Obsidian vault via REST.
  # See lyzetam/fieldy scripts/daily.py.
  schedule: "0 3 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: fieldy-puller
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: dockerhub-secret
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: puller
              image: lzetam/fieldy-webhook:v0.5.0
              command:
                - python
                - /app/scripts/daily.py
              env:
                - name: FIELDY_VAULT_MODE
                  value: "obsidian-api"
                - name: FIELDY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: fieldy-api-key
                      key: api_key
                - name: OBSIDIAN_API_URL
                  valueFrom:
                    secretKeyRef:
                      name: obsidian-api
                      key: api_url
                - name: OBSIDIAN_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: obsidian-api
                      key: api_key
                - name: OBSIDIAN_VERIFY_TLS
                  value: "false"  # see CLAUDE.md
                - name: FIELDY_VAULT_REL_ROOT
                  value: "fieldy"
                - name: FIELDY_STATE_DIR
                  value: "/state"
                - name: FIELDY_MAX_TRANSCRIPT_PAGES
                  value: "50"  # daily 24h window typically needs <30 pages
              resources:
                requests:
                  cpu: 25m
                  memory: 96Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: state
                  mountPath: /state
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: fieldy-puller-state

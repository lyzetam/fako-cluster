apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fieldy-webhook
  namespace: fieldy-webhook
spec:
  podSelector:
    matchLabels:
      app: fieldy-webhook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public traffic enters via the shared cloudflared tunnel running in mcp-gateway.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-gateway
          podSelector:
            matchLabels:
              app: cloudflared
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS — required to resolve obsidian-api.landryzetam.net.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Reply traffic to the shared cloudflared tunnel (TCP responses to ingressing
    # requests). k3s' CNI enforces NetworkPolicy statelessly, so egress must be
    # allowed explicitly even for established connections.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-gateway
          podSelector:
            matchLabels:
              app: cloudflared
    # Obsidian REST API (single host on a private network) on its custom port.
    - to:
        - ipBlock:
            cidr: 10.85.10.195/32
      ports:
        - protocol: TCP
          port: 27124

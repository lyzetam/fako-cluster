apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fieldy-webhook-token
  namespace: fieldy-webhook
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: fieldy-webhook-token
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: fieldy/webhook-token
        property: token

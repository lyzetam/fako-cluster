# aws-credentials Secret in this namespace bootstraps the connection to AWS.
# That Secret is currently kubectl-applied (manual bootstrap). For full GitOps,
# add a SOPS-encrypted aws-credentials Secret manifest at
# apps/staging/piper/aws-credentials-secret.yaml via:
#   ./scripts/secrets/sops-secrets.sh copy
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: piper
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
